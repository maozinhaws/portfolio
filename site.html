<!DOCTYPE html>
<html lang="pt-br" class="scroll-smooth" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium - Engenharia de Superfícies</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        const savedTheme = localStorage.getItem('theme');
        const initialTheme = savedTheme ? savedTheme : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', initialTheme);
        if (initialTheme === 'dark') document.documentElement.classList.add('dark');
    </script>
    <style>
        /* Refino de Materiais Apple: Sombras Suaves e Vidro Ultra-Thin */
        :root {
            --bg-color: #000000;
            --text-color: #f5f5f7;
            --accent-color: #f97316;
            --glass-bg: rgba(20, 20, 20, 0.05);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 20px 50px rgba(0, 0, 0, 0.50); /* Sombra de oclusão reforçada */
            --glass-inset: inset 0 1px 1px rgba(255, 255, 255, 0.05);
            --text-dynamic: #ffffff;
            --text-muted: #a1a1a6;
            --blur-effect: blur(60px) saturate(230%);
            --star-color: #1a1a1a;
            --dot-inactive: rgba(255, 255, 255, 0.15);
        }

        html[data-theme="light"] {
            --bg-color: #f2f2f7;
            --text-color: #1d1d1f;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(0, 0, 0, 0.05);
            --glass-shadow: 0 16px 40px rgba(0, 0, 0, 0.18); /* Sombra clara reforçada para visibilidade */
            --glass-inset: inset 0 1px 1px rgba(255, 255, 255, 0.4);
            --text-dynamic: #000000;
            --text-muted: #3a3a3c;
            --blur-effect: blur(60px) saturate(210%) contrast(1.05);
            --star-color: #ffffff;
            --dot-inactive: rgba(0, 0, 0, 0.1);
        }

        body {
            background: var(--bg-color); color: var(--text-color); margin: 0; overflow-x: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        .ios-glass {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow), var(--glass-inset);
            backdrop-filter: var(--blur-effect);
            -webkit-backdrop-filter: var(--blur-effect);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Efeito de elevação leve no hover/active para cards e botões */
        .ios-glass:active {
            transform: scale(0.98);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .text-dynamic { color: var(--text-dynamic); transition: color 0.3s ease; }
        .text-muted { color: var(--text-muted); transition: color 0.3s ease; }
        .text-accent { color: var(--accent-color); transition: color 0.3s ease; }
        .bg-accent { background-color: var(--accent-color); transition: background-color 0.3s ease; }

        .paint-canvas { position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none; }

        section { scroll-margin-top: 100px; }
        .section-title { font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em; font-size: 0.7rem; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.5rem; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .snap-mandatory-x { scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
        .snap-center { scroll-snap-align: center; }

        @keyframes ios-spring {
            from { transform: scale(0.96); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .animate-spring { animation: ios-spring 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        .dot-base { background-color: var(--dot-inactive); transition: all 0.3s ease; }
        .dot-active { background-color: var(--accent-color) !important; width: 1.1rem !important; }

        .color-slider {
            -webkit-appearance: none;
            width: 80px;
            height: 4px;
            background: linear-gradient(to right, #f97316, #06b6d4, #d946ef, #eab308, #22c55e, #ef4444);
            border-radius: 5px;
            outline: none;
            cursor: pointer;
        }
        .color-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: white;
            border: 2px solid var(--accent-color);
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body class="pb-10">
    <div class="paint-canvas" id="main-canvas"></div>

    <header class="sticky top-0 z-40 w-full ios-glass border-x-0 border-t-0 rounded-b-[2.5rem] mb-6">
        <div class="max-w-6xl mx-auto px-5 py-3.5 flex items-center justify-between gap-4">
            <div id="nav-brand" class="flex-1 flex items-center gap-3 overflow-hidden min-w-0"></div>

            <div class="flex items-center gap-4 shrink-0">
                <div class="flex flex-col items-center gap-1">
                    <span class="text-[7px] uppercase font-bold text-muted tracking-widest">Matiz</span>
                    <input type="range" min="0" max="12" value="0" class="color-slider" oninput="changeAccent(this.value)">
                </div>

                <label class="relative inline-flex items-center cursor-pointer shrink-0">
                    <input type="checkbox" id="theme-toggle" class="sr-only peer" onchange="toggleTheme()">
                    <div class="w-11 h-6 bg-slate-300 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-slate-600 peer-checked:bg-accent shadow-sm"></div>
                    <i class="fa-solid fa-moon absolute right-1.5 text-[10px] text-white/80 pointer-events-none peer-checked:opacity-0 transition-opacity"></i>
                    <i class="fa-solid fa-sun absolute left-1.5 text-[10px] text-white/80 pointer-events-none opacity-0 peer-checked:opacity-100 transition-opacity"></i>
                </label>
            </div>
        </div>
    </header>

    <nav class="fixed right-2.5 top-1/2 -translate-y-1/2 z-50 flex flex-col gap-3 ios-glass p-1.5 rounded-full shadow-xl">
        <a href="#servicos" class="w-11 h-11 rounded-full flex items-center justify-center text-accent active:scale-90 transition-all ios-glass border-none hover:bg-white/5" title="Serviços">
            <div class="relative w-6 h-6 flex items-center justify-center">
                <i class="fa-solid fa-paint-brush absolute text-[16px]" style="transform: rotate(-45deg) translateX(-1px);"></i>
                <i class="fa-solid fa-paint-brush absolute text-[16px]" style="transform: rotate(45deg) scaleX(-1) translateX(-1px);"></i>
            </div>
        </a>
        <a href="#cases" class="w-11 h-11 rounded-full flex items-center justify-center text-accent active:scale-90 transition-all ios-glass border-none hover:bg-white/5" title="Cases">
            <div class="relative w-6 h-6 flex items-center justify-center">
                <i class="fa-solid fa-comment text-[22px]"></i>
                <i class="fa-solid fa-star absolute text-[9px] pb-[2px]" style="color: var(--star-color); transition: color 0.3s ease;"></i>
            </div>
        </a>
        <a href="#sobre" class="w-11 h-11 rounded-full flex items-center justify-center text-accent active:scale-90 transition-all ios-glass border-none hover:bg-white/5" title="Sobre">
            <i class="fa-solid fa-building text-lg"></i>
        </a>
    </nav>

    <main class="max-w-6xl mx-auto px-5 md:pr-24 relative z-10 space-y-10 lg:space-y-16">
        <section class="text-center py-8 ios-glass rounded-[2.5rem] p-7 animate-spring max-w-2xl mx-auto w-full">
            <h1 id="hero-title" class="text-3xl md:text-4xl font-black leading-tight mb-2 text-dynamic tracking-tight"></h1>
            <p id="hero-subtitle" class="text-[10px] md:text-xs text-accent uppercase font-bold tracking-[0.25em]"></p>
        </section>

        <section id="servicos">
            <h2 class="section-title text-dynamic">
                <i class="fa-solid fa-screwdriver-wrench text-accent"></i> Serviços
            </h2>
            <div id="grid-servicos" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4"></div>
        </section>

        <section id="cases">
            <h2 class="section-title text-dynamic"><i class="fa-solid fa-camera-retro text-accent"></i> Depoimentos</h2>
            <article class="ios-glass rounded-[2.5rem] overflow-hidden py-8 shadow-2xl">
                <div class="relative w-full max-w-4xl mx-auto">
                    <div id="cases-track" class="ig-track flex overflow-x-auto snap-mandatory-x hide-scrollbar w-full items-stretch px-4 gap-6"></div>
                </div>
                <div id="carousel-dots" class="flex justify-center gap-1.5 pt-6 items-center"></div>
            </article>
        </section>

        <section id="sobre" class="ios-glass rounded-[2.5rem] p-8 md:p-12 shadow-2xl grid md:grid-cols-2 gap-8 items-center">
            <div class="space-y-6">
                <h2 class="section-title text-dynamic m-0"><i class="fa-solid fa-building text-accent"></i> Empresa</h2>
                <p id="sobre-texto" class="text-sm md:text-base text-muted leading-relaxed font-medium"></p>

                <h3 class="text-[9px] font-black uppercase text-dynamic tracking-widest mb-2.5 flex items-center gap-2"><i class="fa-solid fa-rocket text-accent"></i> Missão</h3>
                <p id="missao-texto" class="text-xs md:text-sm text-muted leading-relaxed font-medium"></p>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="ios-glass rounded-[2rem] p-6 text-center border-none bg-white/5">
                    <span id="anos-experiencia" class="block text-3xl md:text-4xl font-black text-dynamic"></span>
                    <span class="text-[10px] uppercase font-bold text-accent tracking-wider">Anos Exp.</span>
                </div>
                <div class="ios-glass rounded-[2rem] p-6 text-center border-none bg-white/5">
                    <span id="obras-entregues" class="block text-3xl md:text-4xl font-black text-dynamic"></span>
                    <span class="text-[10px] uppercase font-bold text-accent tracking-wider">Projetos</span>
                </div>
            </div>
        </section>
    </main>

    <div class="fixed bottom-6 left-5 z-50 pointer-events-none">
        <a id="btn-whatsapp" href="#" target="_blank" class="pointer-events-auto w-14 h-14 md:w-16 md:h-16 bg-[#25D366] rounded-full flex items-center justify-center shadow-2xl active:scale-90 transition-transform text-white ios-glass border-none">
            <i class="fa-brands fa-whatsapp text-2xl md:text-3xl drop-shadow-md"></i>
        </a>
    </div>

    <div id="gallery-modal" onclick="handleModalClick(event)" class="fixed inset-0 hidden flex-col opacity-0 transition-opacity duration-[400ms] z-[100] ios-glass">
        <div id="modal-content" class="flex flex-col h-full w-full scale-95 opacity-0 transition-all duration-[400ms] ease-[cubic-bezier(0.2,0.8,0.2,1)] transform-gpu">
            <div class="w-full max-w-4xl mx-auto px-6 pt-12 pb-4 flex justify-between items-center text-dynamic">
                <div class="flex flex-col">
                    <span class="text-[9px] font-black text-accent uppercase tracking-widest">Galeria</span>
                    <h2 id="modal-title" class="text-xl md:text-2xl font-black tracking-tight"></h2>
                </div>
                <button onclick="closeGallery()" class="w-10 h-10 md:w-12 md:h-12 ios-glass rounded-full flex items-center justify-center active:scale-90 transition-transform border-none"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <div class="relative w-full max-w-4xl mx-auto flex-1 flex flex-col justify-center">
                <div id="modal-track" class="w-full flex overflow-x-auto snap-mandatory-x hide-scrollbar items-stretch px-5 gap-8"></div>
                <div id="modal-dots" class="flex justify-center gap-2 pt-8 items-center"></div>
            </div>
            <div class="w-full max-w-4xl mx-auto pb-12 pt-4 text-center text-[10px] uppercase font-bold text-muted tracking-[0.2em]">Navegação lateral ativa</div>
        </div>
    </div>

    <script>
        let globalData = null;
        const colors = ['#f97316', '#06b6d4', '#d946ef', '#eab308', '#22c55e', '#ef4444', '#3b82f6', '#8b5cf6', '#14b8a6', '#f43f5e', '#a855f7', '#fb923c', '#4ade80'];

        function changeAccent(index) {
            const newColor = colors[index];
            document.documentElement.style.setProperty('--accent-color', newColor);
            localStorage.setItem('accentColor', newColor);
            localStorage.setItem('accentIndex', index);
            initParallax();
        }

        function initParallax() {
            const canvas = document.getElementById('main-canvas');
            if(!canvas) return;
            canvas.innerHTML = '';
            const drops = [];
            const count = window.innerWidth > 768 ? 45 : 26;
            const currentAccent = getComputedStyle(document.documentElement).getPropertyValue('--accent-color').trim();

            for(let i=0; i < count; i++) {
                const drop = document.createElement('div');
                const size = Math.random() * 100 + 40;
                const speed = Math.random() * 0.5 + 0.1;
                const color = i % 2 === 0 ? currentAccent : colors[Math.floor(Math.random() * colors.length)];

                drop.className = 'absolute pointer-events-none';
                drop.style.left = `${Math.random() * 100}%`;
                drop.style.top = `${Math.random() * 200 - 30}vh`;
                drop.style.opacity = (Math.random() * 0.3 + 0.2).toFixed(2);
                drop.style.width = `${size}px`; drop.style.height = `${size}px`;
                drop.dataset.speed = speed;

                drop.style.filter = 'blur(12px)';

                const core = document.createElement('div');
                core.className = 'absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[60%] h-[60%] transition-colors duration-500';
                core.style.backgroundColor = color;
                core.style.borderRadius = '35% 65% 70% 30% / 30% 30% 70% 70%';

                drop.appendChild(core);
                canvas.appendChild(drop);
                drops.push(drop);
            }

            window.removeEventListener('scroll', window.parallaxScroll);
            window.parallaxScroll = () => {
                const scrollY = window.scrollY;
                requestAnimationFrame(() => {
                    drops.forEach(drop => {
                        drop.style.transform = `translateY(${scrollY * -drop.dataset.speed}px)`;
                    });
                });
            };
            window.addEventListener('scroll', window.parallaxScroll, { passive: true });
        }

        function toggleTheme() {
            const isDark = document.getElementById('theme-toggle').checked;
            const newTheme = isDark ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            if (newTheme === 'dark') document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
            localStorage.setItem('theme', newTheme);
        }

        async function initApp() {
            const savedAccent = localStorage.getItem('accentColor');
            const savedIndex = localStorage.getItem('accentIndex');
            if (savedAccent) {
                document.documentElement.style.setProperty('--accent-color', savedAccent);
                const slider = document.querySelector('.color-slider');
                if (slider) slider.value = savedIndex || 0;
            }

            initParallax();
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const themeToggle = document.getElementById('theme-toggle');
            if(themeToggle) themeToggle.checked = currentTheme === 'dark';

            globalData = {
                "empresa": {
                    "nome": "PREMIUM", "logo_url": "", "bg_url": "", "whatsapp": "5511999999999", "hero_titulo": "Engenharia de Alto Padrão",
                    "hero_subtitulo": "Excelência em Acabamentos", "sobre_texto": "Especialistas em projetos de luxo com rigor técnico e pontualidade britânica para clientes exigentes.",
                    "missao_texto": "Elevar o padrão do mercado de revestimentos através de inovação técnica.", "anos_experiencia": "10+", "obras_entregues": "500+"
                },
                "servicos": [
                    { "id": "airless", "titulo": "Pintura Airless", "descricao": "Acabamento espelhado de alta performance mecanizada.", "galeria": ["https://images.unsplash.com/photo-1589939705384-5185137a7f0f?w=800", "https://images.unsplash.com/photo-1562259949-e8e7689d7828?w=800"] },
                    { "id": "textura", "titulo": "Textura Nobre", "descricao": "Efeitos decorativos e marmorato exclusivo premium.", "galeria": ["https://images.unsplash.com/photo-1615873968403-89e068629275?w=800", "https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=800"] },
                    { "id": "cimento", "titulo": "Cimento Queimado", "descricao": "Estética industrial sofisticada de alta durabilidade.", "galeria": ["https://images.unsplash.com/photo-1533090161767-e6ffed986c88?w=800"] }
                ],
                "cases": [
                    { "imagem": "https://images.unsplash.com/photo-1497366216548-37526070297c?w=800", "cliente": "Construtora Alpha", "comentario": "Execução técnica impecável em todos os detalhes do projeto.", "estrelas": 5 },
                    { "imagem": "https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?w=800", "cliente": "Arquiteta Maria F.", "comentario": "Qualidade extraordinária e compromisso com prazos.", "estrelas": 5 }
                ]
            };
            renderizarInterface(globalData);
        }

        function renderizarInterface(data) {
            const navBrand = document.getElementById('nav-brand');
            navBrand.innerHTML = `<div class="flex items-center gap-3 shrink-0"><div class="w-10 h-10 bg-accent rounded-xl flex items-center justify-center shadow-lg"><i class="fa-solid fa-brush text-white text-sm"></i></div><div class="text-left"><h1 class="text-base md:text-lg font-black tracking-tight text-dynamic uppercase leading-none truncate">${data.empresa.nome}</h1><p class="text-accent font-bold text-[7px] md:text-[8px] uppercase tracking-[0.25em] mt-1">Acabamentos</p></div></div>`;
            document.getElementById('hero-title').innerHTML = data.empresa.hero_titulo;
            document.getElementById('hero-subtitle').innerText = data.empresa.hero_subtitulo;
            document.getElementById('sobre-texto').innerText = data.empresa.sobre_texto;
            document.getElementById('missao-texto').innerText = data.empresa.missao_texto;
            document.getElementById('anos-experiencia').innerText = data.empresa.anos_experiencia;
            document.getElementById('obras-entregues').innerText = data.empresa.obras_entregues;
            document.getElementById('btn-whatsapp').href = `https://wa.me/${data.empresa.whatsapp}`;

            const grid = document.getElementById('grid-servicos');
            grid.innerHTML = data.servicos.map(s => `<div class="ios-glass rounded-[1.8rem] p-6 text-center cursor-pointer active:scale-95 transition-transform flex flex-col justify-center min-h-[120px]" onclick="openGallery('${s.id}', '${s.titulo}')"><h3 class="text-[11px] md:text-[12px] font-black uppercase text-dynamic leading-tight tracking-wide">${s.titulo}</h3><p class="text-[9px] text-muted mt-2 font-medium line-clamp-2">${s.descricao}</p></div>`).join('');

            const track = document.getElementById('cases-track');
            const dots = document.getElementById('carousel-dots');
            track.innerHTML = data.cases.map(c => `<div class="w-full flex-none snap-center ios-glass rounded-[2.5rem] p-6 flex flex-col md:flex-row gap-6 justify-between shadow-xl"><div class="w-full md:w-1/2 h-56 md:h-72 relative rounded-[1.8rem] overflow-hidden border border-white/5 shadow-inner"><img src="${c.imagem}" class="absolute inset-0 w-full h-full object-cover"></div><div class="flex flex-col flex-1 px-2 justify-center"><p class="text-sm md:text-base text-dynamic font-medium italic leading-relaxed">"${c.comentario}"</p><span class="text-[10px] md:text-xs font-black text-accent uppercase mt-5 tracking-[0.2em]">- ${c.cliente}</span></div></div>`).join('');

            if (dots) {
                dots.innerHTML = data.cases.map((_, i) => `<div class="transition-all duration-300 rounded-full h-1.5 dot-base ${i === 0 ? 'dot-active' : ''}" id="dot-${i}"></div>`).join('');
                track.addEventListener('scroll', () => {
                    const idx = Math.round(track.scrollLeft / track.clientWidth);
                    data.cases.forEach((_, i) => {
                        const d = document.getElementById(`dot-${i}`);
                        if (d) i === idx ? d.classList.add('dot-active') : d.classList.remove('dot-active');
                    });
                }, { passive: true });
            }
        }

        function openGallery(sid, title) {
            const s = globalData.servicos.find(x => x.id === sid);
            document.getElementById('modal-title').innerText = title;
            const track = document.getElementById('modal-track');
            const dots = document.getElementById('modal-dots');
            track.innerHTML = s.galeria.map(img => `<div class="w-full flex-none snap-center relative aspect-video md:aspect-[21/9] rounded-[2.2rem] overflow-hidden shadow-2xl border border-white/10 ios-glass"><img src="${img}" class="absolute inset-0 w-full h-full object-cover"></div>`).join('');
            track.scrollLeft = 0;

            if (dots) {
                dots.innerHTML = s.galeria.map((_, i) => `<div class="transition-all duration-300 rounded-full h-1.5 dot-base ${i === 0 ? 'dot-active' : ''}" id="m-dot-${i}"></div>`).join('');
                track.addEventListener('scroll', () => {
                    const idx = Math.round(track.scrollLeft / track.clientWidth);
                    s.galeria.forEach((_, i) => {
                        const d = document.getElementById(`m-dot-${i}`);
                        if (d) i === idx ? d.classList.add('dot-active') : d.classList.remove('dot-active');
                    });
                }, { passive: true });
            }
            const modal = document.getElementById('gallery-modal');
            const content = document.getElementById('modal-content');
            modal.classList.remove('hidden'); modal.classList.add('flex');
            void modal.offsetWidth;
            modal.classList.remove('opacity-0');
            content.classList.remove('scale-95', 'opacity-0');
            content.classList.add('scale-100', 'opacity-100');
            document.body.style.overflow = 'hidden';
        }

        function closeGallery() {
            const modal = document.getElementById('gallery-modal');
            const content = document.getElementById('modal-content');
            modal.classList.add('opacity-0');
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => { modal.classList.add('hidden'); modal.classList.remove('flex'); document.body.style.overflow = ''; }, 400);
        }

        function handleModalClick(e) {
            const m = document.getElementById('gallery-modal');
            const c = document.getElementById('modal-content');
            if (e.target === m || e.target === c) closeGallery();
        }

        window.addEventListener('resize', () => {
            initParallax();
        });

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
