<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium - Engenharia de Superfícies</title>
    
    <!-- Otimização: Resolução antecipada de DNS e Preconnect para CDNs -->
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin>
    <link rel="dns-prefetch" href="https://images.unsplash.com">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://unpkg.com" crossorigin>
    
    <!-- Otimização: Preload da imagem LCP (Fundo) para acesso instantâneo -->
    <link rel="preload" as="image" href="https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?auto=format&fit=crop&w=1080&q=40&fm=webp">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" media="print" onload="this.media='all'">
    
    <!-- Motor de fluidez de Scroll (Lenis) com defer para não bloquear renderização -->
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.33/dist/lenis.min.js" defer></script>

    <script>
        function startAppSequence() {
            const gateContent = document.getElementById('gate-content');
            const bg = document.querySelector('.bg-fixed-layer');
            const main = document.getElementById('main-content');
            const appGate = document.getElementById('app-gate');

            gateContent.style.opacity = '0';
            gateContent.style.transform = 'scale(0.95)';

            setTimeout(() => {
                bg.classList.remove('intro-mode');
                
                // Exibe o main no DOM para pré-calcular o layout antes de revelar
                main.classList.remove('hidden');
                void main.offsetWidth; 
                
                // Transição cruzada suave
                main.style.opacity = '1';
                appGate.style.opacity = '0';
                
                setTimeout(() => {
                    appGate.style.display = 'none';
                    initScrollReveal();
                }, 800); 
            }, 400);
        }

        function initScrollReveal() {
            const observerOptions = { root: null, rootMargin: '0px 0px -5% 0px', threshold: 0.05 };
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('is-revealed');
                        observer.unobserve(entry.target);
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.reveal-on-scroll').forEach(el => observer.observe(el));
        }
    </script>
    <style>
        :root { 
            --bg-image: url('https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?auto=format&fit=crop&w=1080&q=40&fm=webp');
            --accent-color: #f97316;
            --premium-blue: #170e36; 
            
            --glass-bg: rgba(255, 255, 255, 0.55); 
            --glass-border: rgba(0, 0, 0, 0.08); 
            --glass-blur: blur(15px) saturate(140%);

            --text-main: #0f172a; 
            --text-muted: #475569; 
            --label-text: #0f172a; 
            
            --shadow-vision: 0 15px 35px rgba(0, 0, 0, 0.1), inset 0 1px 1px rgba(255, 255, 255, 0.5);
            --text-shadow: none;
            --smoky-shadow: 0 0 20px rgba(0, 0, 0, 0.9);
            --hero-smoky-shadow: 0 15px 35px rgba(0, 0, 0, 0.9), 0 5px 15px rgba(0, 0, 0, 0.8);
            --font-outline: rgba(0, 0, 0, 0.1);
            --font-outline-dark: rgba(30, 30, 30, 0.9);
            --nav-icon-color: #f97316; 
        }

        body { 
            background: #f8fafc; color: var(--text-main); margin: 0; overflow-x: hidden; overflow-y: scroll;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif; 
            -webkit-font-smoothing: antialiased;
        }

        /* Otimização de Performance de Renderização (Adia cálculo de layout) */
        #sobre, #servicos, #cases {
            content-visibility: auto;
            contain-intrinsic-size: 1px 600px;
        }

        .text-premium { 
            color: var(--premium-blue) !important; 
            text-shadow: none !important; 
            -webkit-text-stroke: 0 !important; 
            transition: color 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .smoky-highlight {
            text-shadow: var(--hero-smoky-shadow);
        }

        .bg-fixed-layer {
            position: fixed; inset: 0; z-index: -2;
            background-image: var(--bg-image);
            background-size: cover; background-position: center;
            transition: filter 2s cubic-bezier(0.25, 1, 0.5, 1), transform 2s cubic-bezier(0.25, 1, 0.5, 1);
            filter: grayscale(0) blur(0px) brightness(1.1);
            will-change: filter, transform; /* GPU Acceleration */
        }

        .bg-fixed-layer.intro-mode { filter: grayscale(1) blur(1px) brightness(0.7); transform: scale(1.05); }

        .liquid-glass { 
            background: var(--glass-bg); 
            border: 1px solid var(--glass-border); 
            backdrop-filter: var(--glass-blur); 
            -webkit-backdrop-filter: var(--glass-blur); 
            box-shadow: var(--shadow-vision);
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), border-color 0.4s ease;
            transform: translateZ(0); 
        }

        .liquid-label {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px);
            padding: 6px 14px;
            border-radius: 24px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            color: var(--label-text);
        }

        .liquid-glass:hover { 
            transform: translateY(-6px) translateZ(0); 
            border-color: rgba(255,255,255,0.3); 
        }

        .bottom-dock { 
            position: fixed; bottom: 20px; 
            left: 0; right: 0; margin-inline: auto;
            z-index: 100; display: flex; gap: 4px; padding: 6px; border-radius: 40px;
            width: fit-content; align-items: center; justify-content: center;
        }

        .nav-item { 
            width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; 
            border-radius: 50%; color: var(--nav-icon-color); 
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), background 0.4s ease;
        }
        @media (min-width: 768px) {
            .bottom-dock { bottom: 28px; gap: 8px; padding: 8px; }
            .nav-item { width: 52px; height: 52px; }
        }
        .nav-item:hover { background: rgba(255,255,255,0.15); transform: scale(1.15); }

        #wa-fab {
            position: fixed; bottom: 20px; right: 20px; z-index: 101;
            width: 48px; height: 48px; border-radius: 50%;
            background: #25D366; color: white; display: flex;
            align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3);
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        #wa-fab:active { transform: scale(0.9); }

        #app-gate { position: fixed; inset: 0; z-index: 500; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); padding: 1rem; transition: opacity 0.8s ease; }
        #gate-content { transition: all 1s cubic-bezier(0.25, 1, 0.5, 1); text-align: center; width: 100%; max-width: 36rem; }

        #main-content { opacity: 0; transition: opacity 1s cubic-bezier(0.25, 1, 0.5, 1); will-change: opacity; }
        
        .reveal-on-scroll {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1), transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            will-change: opacity, transform; /* GPU Acceleration */
        }
        .reveal-on-scroll.is-revealed { opacity: 1; transform: translateY(0); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div class="bg-fixed-layer intro-mode"></div>

    <div id="app-gate">
        <div id="gate-content" class="space-y-6 md:space-y-12">
            <div id="intro-logo-container" class="w-20 h-20 md:w-24 md:h-24 bg-orange-600 rounded-[2rem] md:rounded-[2.5rem] mx-auto flex items-center justify-center shadow-2xl liquid-glass border-white/30 overflow-hidden flex-shrink-0"></div>
            <div class="space-y-4 md:space-y-6 px-4">
                <h2 id="intro-name" class="text-4xl sm:text-5xl md:text-6xl lg:text-7xl font-black tracking-widest md:tracking-[0.1em] text-white uppercase leading-tight shadow-text"></h2>
                <div class="flex justify-center">
                    <span id="intro-subtitle" class="liquid-label font-bold uppercase tracking-[0.2em] sm:tracking-[0.3em] md:tracking-[0.45em] text-[8px] sm:text-[9px] md:text-xs text-center !text-slate-300"></span>
                </div>
            </div>
            <button onclick="startAppSequence()" class="liquid-glass border-white/20 px-8 py-4 md:px-14 md:py-6 rounded-full md:rounded-[2rem] font-black uppercase text-[10px] md:text-xs tracking-[0.2em] hover:scale-105 active:scale-95 transition-all shadow-lg w-[85%] max-w-xs md:max-w-none md:w-auto mt-4">
                <span class="intro-btn-text">Acessar portfólio</span>
            </button>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <header class="sticky top-0 z-40 w-full liquid-glass border-x-0 border-t-0 rounded-b-[2rem] md:rounded-b-[2.5rem] mb-6 md:mb-12">
            <div class="max-w-6xl mx-auto px-4 md:px-6 py-4 flex items-center justify-between">
                <div id="nav-brand" class="flex items-center gap-3 md:gap-4">
                    <div id="header-logo-container" class="w-10 h-10 md:w-12 md:h-12 bg-orange-600 rounded-xl md:rounded-2xl flex items-center justify-center shadow-lg overflow-hidden flex-shrink-0"></div>
                    <div class="text-left flex-1 min-w-0">
                        <h1 id="brand-name" class="text-sm md:text-lg font-black tracking-tighter uppercase leading-none shadow-text truncate max-w-[140px] md:max-w-[200px]"></h1>
                        <p class="text-orange-500 font-bold text-[6px] md:text-[8px] uppercase tracking-[0.3em] mt-1">Engenharia</p>
                    </div>
                </div>
            </div>
        </header>

        <main class="max-w-6xl mx-auto px-4 md:px-6 space-y-12 md:space-y-16 pb-36 md:pb-44">
            <section class="text-center py-10 sm:py-12 md:py-16 liquid-glass rounded-[2.5rem] md:rounded-[3.5rem] p-4 sm:p-6 md:p-10 max-w-3xl mx-auto reveal-on-scroll">
                <h1 id="hero-title" class="text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-black leading-tight mb-5 md:mb-8 tracking-tighter uppercase text-white smoky-highlight"></h1>
                <div class="flex justify-center">
                    <span id="hero-subtitle-label" class="liquid-label font-bold uppercase tracking-[0.2em] sm:tracking-[0.3em] md:tracking-[0.55em] text-[8px] md:text-[10px] text-center text-premium"></span>
                </div>
            </section>

            <section id="sobre" class="liquid-glass rounded-[2.5rem] md:rounded-[3.5rem] p-5 sm:p-8 md:p-14 flex flex-col md:flex-row gap-6 md:gap-16 items-center reveal-on-scroll delay-100">
                <div class="space-y-6 md:space-y-10 text-left flex-1 w-full">
                    <div class="liquid-label">
                        <i class="fa-solid fa-building text-orange-500 text-xs md:text-sm"></i>
                        <h2 class="text-[9px] md:text-[11px] font-black uppercase tracking-widest text-premium">A Empresa</h2>
                    </div>
                    <p id="sobre-texto" class="text-sm md:text-base text-muted leading-relaxed font-medium"></p>
                    <div class="grid grid-cols-2 gap-3 md:gap-4">
                        <div class="liquid-glass rounded-2xl md:rounded-[2rem] p-4 md:p-6 text-center flex flex-col justify-center">
                            <span id="anos-experiencia" class="block text-2xl sm:text-3xl md:text-4xl font-black text-premium"></span>
                            <span class="text-[7px] md:text-[9px] uppercase font-black tracking-widest mt-1 text-premium">Anos Exp.</span>
                        </div>
                        <div class="liquid-glass rounded-2xl md:rounded-[2rem] p-4 md:p-6 text-center flex flex-col justify-center">
                            <span id="obras-entregues" class="block text-2xl sm:text-3xl md:text-4xl font-black text-premium"></span>
                            <span class="text-[7px] md:text-[9px] uppercase font-black tracking-widest mt-1 text-premium">Projetos</span>
                        </div>
                    </div>
                </div>
                <div id="sobre-imagem-container" class="w-28 h-28 sm:w-32 sm:h-32 md:w-48 md:h-48 rounded-2xl md:rounded-3xl overflow-hidden liquid-glass p-1 shadow-2xl flex-shrink-0 flex items-center justify-center"></div>
            </section>

            <section id="servicos">
                <div class="section-header reveal-on-scroll">
                    <div class="liquid-label">
                        <i class="fa-solid fa-paint-roller text-orange-500 text-xs md:text-sm"></i>
                        <h2 class="text-[9px] md:text-[11px] font-black uppercase tracking-widest text-premium">Serviços</h2>
                    </div>
                </div>
                <div id="grid-servicos" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-5 md:gap-6 items-stretch mt-6 md:mt-8"></div>
            </section>

            <section id="cases">
                <div class="section-header reveal-on-scroll">
                    <div class="liquid-label">
                        <i class="fa-solid fa-comment-dots text-orange-500 text-xs md:text-sm"></i>
                        <h2 class="text-[9px] md:text-[11px] font-black uppercase tracking-widest text-premium">Depoimentos</h2>
                    </div>
                </div>
                <div id="cases-track" class="flex overflow-x-auto snap-mandatory-x scrollbar-hide gap-4 sm:gap-5 md:gap-6 pb-6 md:pb-8 items-stretch px-1 mt-6 md:mt-8"></div>
            </section>
        </main>

        <nav class="bottom-dock liquid-glass shadow-2xl">
            <a href="#sobre" class="nav-item" title="Empresa"><i class="fa-solid fa-building"></i></a>
            <a href="#servicos" class="nav-item" title="Serviços"><i class="fa-solid fa-paint-roller"></i></a>
            <a href="#cases" class="nav-item" title="Depoimentos"><i class="fa-solid fa-comment-dots"></i></a>
        </nav>

        <a id="wa-fab" href="#" target="_blank"><i class="fa-brands fa-whatsapp text-2xl md:text-3xl"></i></a>
    </div>

    <div id="immersive-modal" onclick="handleModalClick(event)" class="fixed inset-0 hidden flex-col opacity-0 transition-opacity duration-500 z-[200] liquid-glass rounded-none border-none p-4 md:p-0">
        <div id="modal-body" class="flex flex-col h-full w-full scale-95 opacity-0 transition-all duration-500 cubic-bezier(0.25, 1, 0.5, 1)">
            <div class="w-full max-w-5xl mx-auto px-4 md:px-8 pt-8 sm:pt-10 md:pt-16 pb-4 md:pb-6 flex justify-between items-center">
                <div class="liquid-label max-w-[70%]">
                    <h2 id="modal-header-title" class="text-[10px] md:text-xs font-black tracking-widest uppercase text-premium truncate"></h2>
                </div>
                <button onclick="closeModal()" class="w-10 h-10 md:w-12 md:h-12 liquid-glass rounded-full border-none flex items-center justify-center active:scale-90 transition-transform flex-shrink-0"><i class="fa-solid fa-xmark text-lg md:text-xl"></i></button>
            </div>
            <div class="relative w-full max-w-5xl mx-auto flex-1 flex flex-col justify-center overflow-hidden">
                <div id="modal-images" class="w-full flex overflow-x-auto snap-mandatory-x scrollbar-hide gap-4 md:gap-8 pb-6 md:pb-10 items-center"></div>
                <div id="modal-caption" class="p-4 sm:p-6 md:p-10 text-center text-sm md:text-base text-muted italic font-medium max-w-2xl mx-auto opacity-0 translate-y-4 transition-all duration-700"></div>
            </div>
        </div>
    </div>

    <script>
        let db = null;
        let lenis;

        // Lazy load inicialização de biblioteca pesada para não travar main thread
        window.addEventListener('load', () => {
            setTimeout(() => {
                if(window.Lenis) {
                    lenis = new Lenis({
                        duration: 1.2,
                        easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)), 
                        smooth: true,
                    });
                    function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
                    requestAnimationFrame(raf);
                }
            }, 100);
        });

        async function init() {
            db = {
                "empresa": {
                    "logo": "", 
                    "foto_sobre": "https://images.unsplash.com/photo-1503387762-592deb58ef4e?w=800&q=60&fm=webp", 
                    "nome": "PREMIUM", "whatsapp": "5511999999999", "hero_titulo": "Engenharia de Alto Padrão",
                    "hero_subtitulo": "Estética e Tecnologia de Superfícies", "sobre_texto": "Especialistas na execução de projetos de acabamento de luxo com rigor técnico extremo. Transformamos arquitetura em ambientes exclusivos através de processos de engenharia.",
                    "anos_experiencia": "12+", "obras_entregues": "640+"
                },
                "servicos": [
                    { "id": "airless", "titulo": "Pintura Airless", "descricao": "Acabamento mecanizado de alta precisão para superfícies espelhadas.", "fotos": ["https://images.unsplash.com/photo-1589939705384-5185137a7f0f?w=600&q=50&fm=webp"] },
                    { "id": "textura", "titulo": "Textura Nobre", "descricao": "Revestimentos técnicos com proteção hidrorrepelente de longa duração.", "fotos": ["https://images.unsplash.com/photo-1615873968403-89e068629275?w=600&q=50&fm=webp"] },
                    { "id": "marmorato", "titulo": "Marmorato Polido", "descricao": "Efeito mármore de luxo com brilho vitrificado e profundidade visual.", "fotos": ["https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=600&q=50&fm=webp"] }
                ],
                "cases": [
                    { "id": "c1", "imagem": "https://images.unsplash.com/photo-1497366216548-37526070297c?w=600&q=50&fm=webp", "cliente": "Construtora Alpha", "comentario": "Execução técnica impecável. A equipe cumpriu rigorosamente o cronograma estipulado." },
                    { "id": "c2", "imagem": "https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?w=600&q=50&fm=webp", "cliente": "Arquiteta Maria F.", "comentario": "Excelente qualidade no acabamento em cimento queimado. Total profissionalismo." }
                ]
            };
            renderApp();
        }

        function renderApp() {
            const introLogoEl = document.getElementById('intro-logo-container');
            const headerLogoEl = document.getElementById('header-logo-container');
            
            if(db.empresa.logo && db.empresa.logo.trim() !== "") {
                const logoImg = `<img src="${db.empresa.logo}" alt="Logo" loading="lazy" decoding="async" class="w-full h-full object-contain p-2">`;
                introLogoEl.innerHTML = logoImg;
                headerLogoEl.innerHTML = logoImg;
                introLogoEl.classList.remove('bg-orange-600');
                headerLogoEl.classList.remove('bg-orange-600');
                introLogoEl.classList.add('bg-black/50');
                headerLogoEl.classList.add('bg-black/50');
            } else {
                introLogoEl.innerHTML = `<i class="fa-solid fa-brush text-white text-3xl md:text-4xl"></i>`;
                headerLogoEl.innerHTML = `<i class="fa-solid fa-brush text-white"></i>`;
            }

            document.getElementById('intro-name').innerText = db.empresa.nome;
            document.getElementById('intro-subtitle').innerText = db.empresa.hero_subtitulo;
            document.getElementById('brand-name').innerText = db.empresa.nome;
            document.getElementById('hero-title').innerText = db.empresa.hero_titulo;
            document.getElementById('hero-subtitle-label').innerText = db.empresa.hero_subtitulo;
            document.getElementById('sobre-texto').innerText = db.empresa.sobre_texto;
            document.getElementById('anos-experiencia').innerText = db.empresa.anos_experiencia;
            document.getElementById('obras-entregues').innerText = db.empresa.obras_entregues;
            document.getElementById('wa-fab').href = `https://wa.me/${db.empresa.whatsapp}`;
            
            const sobreImgEl = document.getElementById('sobre-imagem-container');
            if(db.empresa.foto_sobre && db.empresa.foto_sobre.trim() !== "") {
                sobreImgEl.innerHTML = `<img src="${db.empresa.foto_sobre}" alt="Sobre" loading="lazy" decoding="async" class="w-full h-full object-cover transition-transform hover:scale-105 duration-700">`;
            } else if (db.empresa.logo && db.empresa.logo.trim() !== "") {
                sobreImgEl.innerHTML = `<img src="${db.empresa.logo}" alt="Logo" loading="lazy" decoding="async" class="w-[60%] h-[60%] object-contain opacity-40">`;
            } else {
                sobreImgEl.innerHTML = `<i class="fa-solid fa-image text-3xl md:text-4xl text-white/20"></i>`;
            }
            
            const grid = document.getElementById('grid-servicos');
            grid.innerHTML = db.servicos.map((s, i) => {
                const thumbnail = (s.fotos && s.fotos.length > 0) ? s.fotos[0] : null;
                return `
                <div class="liquid-glass rounded-[2rem] md:rounded-[3.5rem] p-5 sm:p-6 md:p-8 cursor-pointer active:scale-95 group flex flex-col items-start gap-4 hover:bg-orange-600 hover:border-orange-600 transition-all h-full reveal-on-scroll" onclick="openServico('${s.id}')">
                    <div class="liquid-label group-hover:bg-orange-600 group-hover:border-orange-500 transition-all">
                        <h3 class="text-[9px] md:text-[11px] font-black uppercase tracking-widest text-premium group-hover:text-white">${s.titulo}</h3>
                    </div>
                    <p class="text-sm md:text-base text-muted leading-relaxed text-left font-medium group-hover:text-white/80 flex-1">${s.descricao}</p>
                    ${thumbnail ? `
                        <div class="w-16 h-16 md:w-20 md:h-20 rounded-[1rem] overflow-hidden mt-auto relative shadow-inner bg-black/10 flex-shrink-0">
                            <img src="${thumbnail}" alt="${s.titulo}" loading="lazy" decoding="async" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                            <div class="absolute inset-0 bg-black/20 group-hover:bg-transparent transition-colors"></div>
                        </div>
                    ` : ''}
                </div>
                `;
            }).join('');
            
            const track = document.getElementById('cases-track');
            track.innerHTML = db.cases.map((c, i) => `
                <div class="w-[85%] sm:w-[60%] lg:w-[45%] flex-none snap-center liquid-glass rounded-[2rem] md:rounded-[3.5rem] p-2 sm:p-3 md:p-4 cursor-pointer group hover:bg-orange-600 hover:border-orange-600 transition-all h-full flex flex-col reveal-on-scroll" onclick="openCase('${c.id}')">
                    <div class="aspect-video rounded-[1.5rem] md:rounded-[3rem] overflow-hidden shadow-2xl relative flex-1">
                        <img src="${c.imagem}" alt="${c.cliente}" loading="lazy" decoding="async" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
                        <div class="absolute bottom-3 left-3 md:bottom-6 md:left-8 right-3 md:right-8 flex items-end">
                            <div class="liquid-label group-hover:bg-orange-600 group-hover:border-orange-500 transition-all px-2 sm:px-3 py-1">
                                <h3 class="text-[7px] sm:text-[8px] md:text-[11px] font-black uppercase tracking-widest text-premium group-hover:text-white whitespace-normal break-words">${c.cliente}</h3>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openServico(id) {
            const s = db.servicos.find(x => x.id === id);
            showModal(s.titulo, s.fotos, "");
        }

        function openCase(id) {
            const c = db.cases.find(x => x.id === id);
            showModal(c.cliente, [c.imagem], c.comentario);
        }

        function showModal(title, images, caption) {
            if(lenis) lenis.stop(); 
            document.getElementById('modal-header-title').innerText = title;
            const container = document.getElementById('modal-images');
            const capt = document.getElementById('modal-caption');
            container.innerHTML = images.map(img => `<div class="w-[85%] md:w-full flex-none snap-center aspect-video rounded-[2rem] overflow-hidden shadow-2xl border border-white/10 mx-auto"><img src="${img}" alt="${title}" class="w-full h-full object-cover"></div>`).join('');
            
            if(caption) {
                capt.innerText = `"${caption}"`;
                capt.classList.remove('opacity-0', 'translate-y-4');
                capt.classList.add('opacity-100', 'translate-y-0');
            } else {
                capt.classList.add('opacity-0');
            }

            const modal = document.getElementById('immersive-modal');
            const body = document.getElementById('modal-body');
            modal.classList.remove('hidden'); modal.classList.add('flex');
            void modal.offsetWidth;
            modal.classList.remove('opacity-0');
            body.classList.remove('scale-95', 'opacity-0');
            body.classList.add('scale-100', 'opacity-100');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            if(lenis) lenis.start(); 
            const modal = document.getElementById('immersive-modal');
            const body = document.getElementById('modal-body');
            modal.classList.add('opacity-0');
            body.classList.remove('scale-100', 'opacity-100');
            body.classList.add('scale-95', 'opacity-0');
            setTimeout(() => { modal.classList.add('hidden'); modal.classList.remove('flex'); document.body.style.overflow = ''; }, 500); 
        }

        function handleModalClick(e) { if (e.target.id === 'immersive-modal' || e.target.id === 'modal-body') closeModal(); }
        
        document.addEventListener('DOMContentLoaded', () => {
            init();
            document.querySelectorAll('.bottom-dock .nav-item').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault(); 
                    const targetId = link.getAttribute('href');
                    if(lenis) {
                        lenis.scrollTo(targetId, { offset: -100, duration: 1.5 });
                    } else {
                        document.querySelector(targetId).scrollIntoView({ behavior: 'smooth' });
                    }
                });
            });
        });
    </script>
</body>
</html>
