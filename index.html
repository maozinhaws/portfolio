<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Premium - Engenharia de Superfícies</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" media="print" onload="this.media='all'">
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.33/dist/lenis.min.js"></script>
    
    <script>
        (function() {
            const script = document.createElement('script');
            script.src = `./dados.js?v=${new Date().getTime()}`;
            script.async = false;
            script.onerror = function() {
                window.db = {
                    "empresa": { 
                        "nome": "PREMIUM", "whatsapp": "5511999999999",
                        "hero_titulo": "Engenharia de Alto Padrão", "hero_subtitulo": "Estética e Tecnologia de Superfícies", 
                        "sobre_texto": "Especialistas na execução de projetos de acabamento de luxo com rigor técnico extremo.", 
                        "anos_experiencia": "12+", "obras_entregues": "640+",
                        "logo": "", "foto_sobre": "https://images.unsplash.com/photo-1503387762-592deb58ef4e?w=800&q=60&fm=webp"
                    },
                    "servicos": [
                        { "id": "airless", "titulo": "Pintura Airless", "descricao": "Acabamento mecanizado de alta precisão.", "fotos": [] }
                    ], 
                    "cases": []
                };
            };
            document.head.appendChild(script);
        })();
    </script>

    <style>
        :root { 
            --bg-image: url('https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?auto=format&fit=crop&w=1080&q=60&fm=webp');
            --accent-color: #f97316;
            --premium-blue: #170e36; 
            --glass-bg: rgba(255, 255, 255, 0.65); 
            --glass-border: rgba(255, 255, 255, 0.2); 
            --glass-blur: blur(12px) saturate(140%);
            --scroll-p: 0; 
        }

        body { background: #f8fafc; color: #0f172a; margin: 0; overflow-x: hidden; font-family: system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }

        /* Fix para Background Mobile: evita scroll junto com a página */
        .bg-fixed-layer {
            position: fixed; inset: 0; z-index: -2;
            background-image: var(--bg-image); background-size: cover; background-position: center;
            filter: saturate(0.85) blur(0.2px) brightness(0.75);
            transform: translateZ(0); /* Força aceleração de GPU */
            will-change: transform, filter;
            pointer-events: none;
        }
        
        .bg-fixed-layer.intro-mode { filter: saturate(0.85) blur(4px) brightness(0.65); transform: scale(1.1) translateZ(0); }

        .bg-fixed-layer.scroll-anim {
            filter: saturate(calc(0.85 + (var(--scroll-p) * 0.75))) blur(0.2px) brightness(calc(0.75 + (var(--scroll-p) * 0.35)));
            transform: scale(calc(1 + (var(--scroll-p) * 0.12))) translateZ(0);
        }

        .liquid-glass { 
            background: var(--glass-bg); border: 1px solid var(--glass-border); 
            backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05); transform: translateZ(0);
        }

        /* Ajustes mobile para alinhar elementos */
        @media (max-width: 768px) {
            .liquid-glass { backdrop-filter: blur(8px); } /* Blur mais leve no mobile para performance */
            section { padding-left: 1rem !important; padding-right: 1rem !important; }
            h1 { font-size: 2.25rem !important; line-height: 1.1 !important; }
        }

        .reveal-on-scroll { opacity: 0; transform: translateY(30px); transition: all 0.7s cubic-bezier(0.25, 1, 0.5, 1); will-change: opacity, transform; }
        .reveal-on-scroll.is-revealed { opacity: 1; transform: translateY(0); }

        .bottom-dock { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 100; display: flex; gap: 8px; padding: 6px; border-radius: 40px; }
        .nav-item { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; border-radius: 50%; color: var(--premium-blue); }

        #app-gate { position: fixed; inset: 0; z-index: 500; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); transition: opacity 0.6s ease; }
        
        .progress-ring__circle { transition: stroke-dashoffset 0.1s; stroke-dasharray: 251.2; stroke-dashoffset: 251.2; }
        .typing-cursor { display: inline-block; width: 2px; height: 1.1em; background-color: var(--premium-blue); margin-left: 3px; animation: blink 0.8s infinite; vertical-align: middle; }
        @keyframes blink { 50% { opacity: 0; } }

        #wa-fab { position: fixed; bottom: 24px; right: 24px; z-index: 90; width: 56px; height: 56px; border-radius: 50%; background: #25D366; color: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3); }
    </style>
</head>
<body>
    <div class="bg-fixed-layer intro-mode"></div>

    <div id="app-gate">
        <div class="text-center space-y-6 w-full max-w-sm px-6">
            <div id="intro-logo-container" class="w-20 h-20 bg-orange-600 rounded-[1.5rem] mx-auto flex items-center justify-center shadow-xl"></div>
            <div class="space-y-2">
                <h2 id="intro-name" class="text-3xl font-black tracking-widest text-white uppercase"></h2>
                <div class="flex justify-center"><span id="intro-subtitle" class="bg-white/10 px-4 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest text-white border border-white/20"></span></div>
            </div>
            <button onclick="startAppSequence()" class="w-full bg-white text-black py-4 rounded-full font-black uppercase text-xs tracking-widest shadow-2xl active:scale-95 transition-transform">Entrar</button>
        </div>
    </div>

    <div id="main-content" class="hidden opacity-0">
        <header class="sticky top-0 z-40 w-full liquid-glass border-b border-black/5">
            <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div id="header-logo-container" class="w-10 h-10 bg-orange-600 rounded-xl flex items-center justify-center shadow-md overflow-hidden"></div>
                    <div>
                        <h1 id="brand-name" class="text-base font-black uppercase tracking-tighter" style="color: var(--premium-blue)"></h1>
                        <p class="text-orange-500 font-bold text-[7px] uppercase tracking-widest">Engenharia</p>
                    </div>
                </div>
            </div>
        </header>

        <main class="max-w-5xl mx-auto px-4 space-y-12 pb-32 pt-8">
            <section class="text-center py-12 liquid-glass rounded-[2.5rem] p-6 reveal-on-scroll">
                <h1 id="hero-title" class="text-3xl md:text-6xl font-black leading-tight mb-6 tracking-tighter uppercase text-slate-800"></h1>
                <div class="flex justify-center items-center">
                    <span id="hero-subtitle-label" class="bg-white/50 px-6 py-2 rounded-full font-black uppercase tracking-widest text-xs min-h-[40px] flex items-center border border-black/5" style="color: var(--premium-blue)"></span>
                </div>
            </section>

            <section id="sobre" class="liquid-glass rounded-[2.5rem] p-6 md:p-12 flex flex-col md:grid md:grid-cols-2 gap-8 items-center reveal-on-scroll">
                <div class="space-y-6 text-left order-2 md:order-1">
                    <div class="inline-flex items-center gap-2 bg-orange-500/10 px-4 py-1 rounded-full text-orange-600 font-black text-[10px] uppercase tracking-widest">
                        <i class="fa-solid fa-building"></i> Sobre
                    </div>
                    <p id="sobre-texto" class="text-sm md:text-base text-slate-600 leading-relaxed font-medium"></p>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-white/40 border border-black/5 rounded-2xl p-4 flex flex-col items-center">
                            <span id="anos-experiencia" class="text-2xl font-black text-slate-800">0</span>
                            <span class="text-[8px] uppercase font-black tracking-widest text-slate-400">Anos Exp.</span>
                        </div>
                        <div class="bg-white/40 border border-black/5 rounded-2xl p-4 flex flex-col items-center">
                            <span id="obras-entregues" class="text-2xl font-black text-slate-800">0</span>
                            <span class="text-[8px] uppercase font-black tracking-widest text-slate-400">Projetos</span>
                        </div>
                    </div>
                </div>
                <div class="order-1 md:order-2 w-full flex justify-center">
                    <div id="sobre-imagem-container" class="relative group w-full max-w-[280px] aspect-square rounded-[2rem] overflow-hidden shadow-xl" onclick="openSobre()"></div>
                </div>
            </section>

            <section id="servicos" class="space-y-6">
                <div class="inline-flex items-center gap-2 bg-orange-500/10 px-4 py-1 rounded-full text-orange-600 font-black text-[10px] uppercase tracking-widest reveal-on-scroll">
                    <i class="fa-solid fa-paint-roller"></i> Serviços
                </div>
                <div id="grid-servicos" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
            </section>
        </main>

        <nav class="bottom-dock liquid-glass border border-white/20">
            <a href="#sobre" class="nav-item active:scale-90 transition-transform"><i class="fa-solid fa-building"></i></a>
            <a href="#servicos" class="nav-item active:scale-90 transition-transform"><i class="fa-solid fa-paint-roller"></i></a>
            <a href="#cases" class="nav-item active:scale-90 transition-transform"><i class="fa-solid fa-comment-dots"></i></a>
        </nav>

        <a id="wa-fab" href="#" target="_blank"><i class="fa-brands fa-whatsapp text-2xl"></i></a>
    </div>

    <div id="immersive-modal" class="fixed inset-0 hidden flex-col opacity-0 transition-opacity duration-300 z-[200] bg-white">
        <div id="modal-body" class="flex flex-col h-full w-full px-4 py-6">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modal-header-title" class="text-xs font-black uppercase tracking-widest truncate text-slate-800"></h2>
                <button onclick="closeModal()" class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-800"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="modal-images" class="flex-1 overflow-y-auto space-y-4"></div>
            <div id="modal-caption" class="mt-4 text-center text-xs text-slate-500 italic pb-8"></div>
        </div>
    </div>

    <script>
        let lenis;
        let typewriterStarted = false;

        // Detecção inteligente de mobile para Lenis
        const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

        window.addEventListener('load', () => {
            initScroll();
            const checkDB = setInterval(() => {
                if (window.db) {
                    clearInterval(checkDB);
                    init();
                }
            }, 50);
        });

        function initScroll() {
            lenis = new Lenis({ 
                duration: 1.2, 
                smooth: !isTouch, // Desativa smooth scroll apenas em touch (melhora performance Android)
                smoothTouch: false 
            });
            
            // Loop de animação otimizado
            function raf(time) {
                lenis.raf(time);
                
                // Atualiza variável CSS de scroll apenas se necessário
                const scrollY = window.scrollY || window.pageYOffset;
                const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
                if(maxScroll > 0) {
                    const progress = Math.min(Math.max(scrollY / maxScroll, 0), 1);
                    document.documentElement.style.setProperty('--scroll-p', progress);
                }
                
                requestAnimationFrame(raf);
            }
            requestAnimationFrame(raf);
        }

        function startAppSequence() {
            const gate = document.getElementById('app-gate');
            const main = document.getElementById('main-content');
            const bg = document.querySelector('.bg-fixed-layer');
            
            gate.style.opacity = '0';
            setTimeout(() => {
                gate.style.display = 'none';
                bg.classList.remove('intro-mode');
                main.classList.remove('hidden');
                setTimeout(() => { 
                    main.style.opacity = '1'; 
                    initScrollReveal();
                    startTypewriterEffect();
                    setTimeout(() => bg.classList.add('scroll-anim'), 1000);
                }, 50);
            }, 600);
        }

        function startTypewriterEffect() {
            if (typewriterStarted) return;
            const el = document.getElementById('hero-subtitle-label');
            const text = window.db.empresa.hero_subtitulo || "";
            let i = 0; typewriterStarted = true;
            el.innerHTML = "";
            function type() {
                if (i < text.length) {
                    el.textContent = text.substring(0, i + 1);
                    const cursor = document.createElement('span');
                    cursor.className = 'typing-cursor';
                    el.appendChild(cursor);
                    i++; setTimeout(type, 50);
                }
            }
            type();
        }

        function initScrollReveal() {
            const obs = new IntersectionObserver((entries) => {
                entries.forEach(en => {
                    if (en.isIntersecting) {
                        en.target.classList.add('is-revealed');
                        if(en.target.id === 'sobre') triggerCounters();
                    }
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('.reveal-on-scroll').forEach(el => obs.observe(el));
        }

        function triggerCounters() {
            animateCounter('anos-experiencia', window.db.empresa.anos_experiencia);
            animateCounter('obras-entregues', window.db.empresa.obras_entregues);
        }

        function animateCounter(id, targetStr) {
            const el = document.getElementById(id);
            if(!el || el.dataset.animated === "true") return;
            const num = parseInt(targetStr.replace(/\D/g, '')) || 0;
            const suffix = targetStr.replace(/[0-9]/g, '');
            let count = 0;
            const step = num / 60;
            const timer = setInterval(() => {
                count += step;
                if(count >= num) { el.innerText = num + suffix; clearInterval(timer); el.dataset.animated = "true"; }
                else { el.innerText = Math.floor(count) + suffix; }
            }, 16);
        }

        function init() {
            const { empresa, servicos, cases } = window.db;
            document.getElementById('intro-name').innerText = empresa.nome;
            document.getElementById('brand-name').innerText = empresa.nome;
            document.getElementById('intro-subtitle').innerText = empresa.hero_subtitulo;
            document.getElementById('hero-title').innerText = empresa.hero_titulo;
            document.getElementById('sobre-texto').innerText = empresa.sobre_texto;
            document.getElementById('wa-fab').href = `https://wa.me/${empresa.whatsapp}`;
            
            const logo = empresa.logo ? `<img src="${empresa.logo}" class="w-full h-full object-contain">` : `<i class="fa-solid fa-brush text-white"></i>`;
            document.getElementById('intro-logo-container').innerHTML = logo;
            document.getElementById('header-logo-container').innerHTML = logo;
            
            document.getElementById('sobre-imagem-container').innerHTML = `<img src="${empresa.foto_sobre}" class="w-full h-full object-cover">`;

            document.getElementById('grid-servicos').innerHTML = servicos.map(s => `
                <div class="liquid-glass rounded-3xl p-6 active:scale-[0.98] transition-transform reveal-on-scroll" onclick="openServico('${s.id}')">
                    <h3 class="text-xs font-black uppercase mb-2 text-slate-800">${s.titulo}</h3>
                    <p class="text-[11px] text-slate-500 leading-relaxed line-clamp-2">${s.descricao}</p>
                </div>
            `).join('');

            // Navegação suave
            document.querySelectorAll('.nav-item').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const target = link.getAttribute('href');
                    lenis.scrollTo(target, { offset: -80 });
                });
            });
        }

        function openSobre() { showModal("A Empresa", [window.db.empresa.foto_sobre], window.db.empresa.sobre_texto); }
        function openServico(id) { const s = window.db.servicos.find(x => x.id === id); showModal(s.titulo, s.fotos, s.descricao); }

        function showModal(title, images, caption) {
            lenis.stop();
            const modal = document.getElementById('immersive-modal');
            document.getElementById('modal-header-title').innerText = title;
            document.getElementById('modal-images').innerHTML = images.map(img => `<img src="${img}" class="w-full rounded-2xl shadow-sm">`).join('');
            document.getElementById('modal-caption').innerText = caption;
            modal.classList.remove('hidden');
            setTimeout(() => modal.classList.add('opacity-100'), 10);
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('immersive-modal');
            modal.classList.remove('opacity-100');
            setTimeout(() => { modal.classList.add('hidden'); lenis.start(); document.body.style.overflow = ''; }, 300);
        }
    </script>
</body>
</html>
