<!DOCTYPE html>
<html lang="pt-br" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portfólio de Engenharia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --paint-orange: #f97316; --paint-cyan: #06b6d4; --paint-magenta: #d946ef; }
        body { background: #020617; margin: 0; overflow-x: hidden; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif; color: white; -webkit-tap-highlight-color: transparent; }
        .paint-canvas { position: fixed; inset: 0; z-index: -1; overflow: hidden; }
        .paint-roller { position: absolute; width: 150px; height: 0; opacity: 0.4; filter: blur(60px); animation: rolling 12s infinite ease-in-out; will-change: top, height; }
        .r1 { background: var(--paint-orange); left: 15%; animation-delay: 0s; }
        .r2 { background: var(--paint-cyan); left: 55%; animation-delay: -4s; }
        .r3 { background: var(--paint-magenta); left: 85%; animation-delay: -8s; }
        @keyframes rolling { 0% { top: -20%; height: 0; opacity: 0; } 20% { height: 50%; opacity: 0.5; } 80% { top: 100%; height: 20%; opacity: 0.2; } 100% { top: 130%; height: 0; opacity: 0; } }
        .glass-overlay { position: fixed; inset: 0; backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); background: rgba(2, 6, 23, 0.6); z-index: 0; pointer-events: none; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; backdrop-filter: blur(10px); }
        section { scroll-margin-top: 100px; } 
        .section-title { color: #ffffff; font-weight: 900; text-transform: uppercase; letter-spacing: 0.3em; font-size: 0.75rem; margin-bottom: 1.5rem; text-shadow: 0 4px 10px rgba(0,0,0,0.8); display: flex; align-items: center; gap: 0.5rem; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .snap-mandatory-x { scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
        .snap-center { scroll-snap-align: center; }
        .dot { transition: all 0.2s ease; }
        .dot.active { background-color: var(--paint-orange); transform: scale(1.2); }
        .modal-track { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 12px; padding: 0 20px 40px 20px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .modal-track::-webkit-scrollbar { display: none; }
        .modal-img { flex: 0 0 85%; height: 60vh; scroll-snap-align: center; object-fit: cover; border-radius: 24px; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 10px 30px rgba(0,0,0,0.5); background-color: #1e293b; }
    </style>
</head>
<body class="pb-28">
    <div class="paint-canvas">
        <div class="paint-roller r1"></div><div class="paint-roller r2"></div><div class="paint-roller r3"></div>
    </div>
    <div class="glass-overlay"></div>

    <nav class="sticky top-0 z-50 w-full bg-slate-950/70 backdrop-blur-xl border-b border-white/10">
        <div class="max-w-md mx-auto px-4 py-4 flex justify-center items-center" id="nav-brand">
            <!-- Renderização dinâmica combinada -->
        </div>
    </nav>

    <main class="max-w-md mx-auto px-4 pt-8 relative z-10 space-y-12">
        <header class="text-center py-6">
            <h1 id="hero-title" class="text-3xl font-black leading-tight mb-3 text-white"></h1>
            <p id="hero-subtitle" class="text-[11px] text-slate-400 uppercase font-bold tracking-widest"></p>
        </header>

        <section id="servicos">
            <h2 class="section-title">
                <i class="fa-solid fa-screwdriver-wrench text-orange-500"></i> Serviços Prestados 
                <span class="text-[9px] font-normal normal-case tracking-normal text-slate-400 ml-1 mt-0.5">(clique para visualizar)</span>
            </h2>
            <div id="grid-servicos" class="grid grid-cols-2 gap-4"></div>
        </section>

        <section id="cases">
            <h2 class="section-title"><i class="fa-solid fa-camera-retro text-orange-500"></i> Cases de Sucesso</h2>
            <article class="glass-card overflow-hidden mb-6 ig-carousel">
                <div class="p-4 flex items-center justify-between border-b border-white/5">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full border-2 border-orange-500 flex items-center justify-center bg-slate-900 shadow-lg">
                            <i class="fa-solid fa-medal text-orange-500 text-sm"></i>
                        </div>
                        <div>
                            <h3 class="text-sm font-black leading-tight text-white tracking-wide">Avaliações</h3>
                            <p class="text-[10px] text-slate-400 uppercase tracking-widest mt-0.5">Depoimentos</p>
                        </div>
                    </div>
                </div>
                <div class="relative">
                    <div id="cases-track" class="ig-track flex overflow-x-auto snap-mandatory-x hide-scrollbar w-full items-stretch transition-opacity duration-300"></div>
                    <div class="absolute top-4 right-4 bg-black/60 backdrop-blur-md text-white text-[10px] font-bold px-3 py-1.5 rounded-full ig-counter shadow-lg hidden"></div>
                </div>
                <div class="p-4 bg-slate-900/30 flex justify-center gap-1.5 flex-wrap ig-dots"></div>
            </article>
        </section>

        <section id="sobre" class="glass-card p-6">
            <h2 class="section-title"><i class="fa-solid fa-building text-orange-500"></i> Sobre a Empresa</h2>
            <p id="sobre-texto" class="text-sm text-slate-300 leading-relaxed font-medium mb-6"></p>
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-slate-900/50 rounded-xl p-4 text-center border border-white/5">
                    <span id="anos-experiencia" class="block text-2xl font-black text-white"></span>
                    <span class="text-[9px] uppercase font-bold text-orange-500">Anos Exp.</span>
                </div>
                <div class="bg-slate-900/50 rounded-xl p-4 text-center border border-white/5">
                    <span id="obras-entregues" class="block text-2xl font-black text-white"></span>
                    <span class="text-[9px] uppercase font-bold text-orange-500">Obras</span>
                </div>
            </div>
        </section>
    </main>

    <div class="fixed bottom-28 left-0 right-0 z-50 px-4 max-w-md mx-auto pointer-events-none flex justify-end">
        <a id="btn-whatsapp" href="#" target="_blank" class="pointer-events-auto w-14 h-14 bg-orange-600 rounded-full flex items-center justify-center shadow-lg active:scale-95 transition-transform">
            <i class="fa-brands fa-whatsapp text-white text-3xl"></i>
        </a>
    </div>

    <div id="gallery-modal" class="fixed inset-0 hidden flex-col justify-center items-center opacity-0 transition-opacity duration-300 z-[100]">
        <div class="absolute inset-0 bg-slate-950/80 backdrop-blur-xl"></div>
        <div class="w-full max-w-md px-6 pt-10 pb-4 flex justify-between items-center z-10 relative text-white">
            <h2 id="modal-title" class="text-xl font-black"></h2>
            <button onclick="closeGallery()" class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div id="modal-track" class="w-full max-w-md modal-track mt-2 relative z-10"></div>
    </div>

    <script>
        let globalData = null;

        async function initApp() {
            try {
                // Cache Buster: garante que o navegador ignore o cache local e busque o JSON novo no GitHub
                const url = 'data.json?t=' + Date.now();
                const response = await fetch(url, { 
                    cache: 'no-store',
                    headers: { 'Cache-Control': 'no-cache' }
                });
                
                if (!response.ok) throw new Error('data.json não encontrado.');
                globalData = await response.json();
                renderizarInterface(globalData);
            } catch (error) {
                console.error(error);
                document.body.innerHTML += `<div class="fixed bottom-0 w-full p-4 bg-red-600 text-white text-center z-[100]">${error.message}</div>`;
            }
        }

        function renderizarInterface(data) {
            const navBrand = document.getElementById('nav-brand');
            
            // CORREÇÃO PONTUAL: Renderiza Logo + Nome simultaneamente
            let htmlBrand = "";
            if(data.empresa.logo_url) {
                htmlBrand += `<img src="${data.empresa.logo_url}" class="h-8 mr-3 object-contain">`;
            }
            htmlBrand += `<span class="text-xl font-black tracking-tighter text-white uppercase">${data.empresa.nome}<span class="text-orange-500">.</span></span>`;
            navBrand.innerHTML = htmlBrand;

            document.getElementById('hero-title').innerHTML = (data.empresa.hero_titulo || '').replace(/\n/g, '<br>');
            document.getElementById('hero-subtitle').innerText = data.empresa.hero_subtitulo || '';
            document.getElementById('sobre-texto').innerText = data.empresa.sobre_texto || '';
            document.getElementById('anos-experiencia').innerText = data.empresa.anos_experiencia || '';
            document.getElementById('obras-entregues').innerText = data.empresa.obras_entregues || '';
            document.getElementById('btn-whatsapp').href = `https://wa.me/${data.empresa.whatsapp}`;

            const grid = document.getElementById('grid-servicos');
            grid.innerHTML = data.servicos.map(serv => `
                <div class="glass-card p-5 text-center cursor-pointer group active:scale-95 transition-all" onclick="openGallery('${serv.id}', '${serv.titulo}')">
                    <i class="fa-solid ${serv.icone || 'fa-paint-roller'} text-orange-500 text-2xl mb-3 block"></i>
                    <h3 class="text-[10px] font-black uppercase text-white">${serv.titulo}</h3>
                    <p class="text-[9px] text-slate-400 mt-1">${serv.descricao}</p>
                </div>
            `).join('');

            const track = document.getElementById('cases-track');
            track.innerHTML = data.cases.map(c => `
                <div class="w-full flex-none snap-center relative aspect-[4/5]">
                    <img src="${c.imagem}" class="absolute inset-0 w-full h-full object-cover">
                    <div class="absolute inset-x-0 bottom-0 p-5 bg-slate-900/60 backdrop-blur-xl border-t border-white/10">
                        <p class="text-xs text-white font-medium">"${c.comentario}"</p>
                        <span class="text-[9px] font-black text-orange-400 uppercase mt-3 block">- ${c.cliente}</span>
                    </div>
                </div>
            `).join('');
        }

        function openGallery(id, title) {
            const serv = globalData.servicos.find(s => s.id === id);
            if(!serv || !serv.galeria.length) return alert('Sem fotos para este serviço.');
            document.getElementById('modal-title').innerText = title;
            const track = document.getElementById('modal-track');
            track.innerHTML = serv.galeria.map(img => `<img src="${img}" class="modal-img">`).join('');
            const modal = document.getElementById('gallery-modal');
            modal.classList.remove('hidden');
            setTimeout(() => modal.classList.add('opacity-100', 'flex'), 10);
            document.body.style.overflow = 'hidden';
        }

        function closeGallery() {
            const modal = document.getElementById('gallery-modal');
            modal.classList.remove('opacity-100');
            setTimeout(() => { modal.classList.add('hidden'); document.body.style.overflow = ''; }, 300);
        }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
