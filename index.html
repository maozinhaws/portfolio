<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium - Engenharia de Superfícies</title>
    
    <!-- Otimização: Resolução antecipada de DNS e Preconnect para CDNs -->
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin>
    <link rel="dns-prefetch" href="https://images.unsplash.com">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://unpkg.com" crossorigin>
    
    <!-- Otimização: Preload da imagem LCP (Fundo) para acesso instantâneo -->
    <link rel="preload" as="image" href="https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?auto=format&fit=crop&w=1080&q=40&fm=webp">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" media="print" onload="this.media='all'">
    
    <!-- Motor de fluidez de Scroll (Lenis) com defer para não bloquear renderização -->
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.33/dist/lenis.min.js" defer></script>

    <script>
        const applyTheme = (theme) => {
            document.documentElement.setAttribute('data-theme', theme);
            const isDark = theme === 'dark';
            document.documentElement.classList.toggle('dark', isDark);
            localStorage.setItem('theme-pref', theme);
            const toggle = document.getElementById('theme-toggle-check');
            if(toggle) toggle.checked = isDark;
        };

        const initTheme = () => {
            const saved = localStorage.getItem('theme-pref');
            if (saved) applyTheme(saved);
            else applyTheme(window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        };

        initTheme();

        function startAppSequence() {
            const gateContent = document.getElementById('gate-content');
            const bg = document.querySelector('.bg-fixed-layer');
            const main = document.getElementById('main-content');
            const appGate = document.getElementById('app-gate');

            gateContent.style.opacity = '0';
            gateContent.style.transform = 'scale(0.95)';

            setTimeout(() => {
                bg.classList.remove('intro-mode');
                setTimeout(() => {
                    appGate.style.display = 'none';
                    main.classList.remove('hidden');
                    void main.offsetWidth; // Força reflow
                    main.style.opacity = '1';
                    
                    initScrollReveal();
                }, 1000); 
            }, 400);
        }

        function toggleThemeManual() {
            const isChecked = document.getElementById('theme-toggle-check').checked;
            applyTheme(isChecked ? 'dark' : 'light');
        }

        function initScrollReveal() {
            const observerOptions = { root: null, rootMargin: '0px 0px -10% 0px', threshold: 0.1 };
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('is-revealed');
                        observer.unobserve(entry.target);
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.reveal-on-scroll').forEach(el => observer.observe(el));
        }
    </script>
    <style>
        :root { 
            /* Otimização: Imagem reduzida para w=1080 e q=40 (poupança massiva de dados, mantém estética com blur) */
            --bg-image: url('https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?auto=format&fit=crop&w=1080&q=40&fm=webp');
            --accent-color: #f97316;
            --premium-blue: #170e36; 
            
            --glass-bg: rgba(255, 255, 255, 0.25); 
            --glass-border: rgba(255, 255, 255, 0.18); 
            --glass-blur: blur(15px) saturate(180%);

            --text-main: #ffffff; 
            --text-muted: #cbd5e1; 
            --label-text: #ffffff; 
            
            --shadow-vision: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            --text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
            --smoky-shadow: 0 0 20px rgba(0, 0, 0, 0.9);
            --font-outline: rgba(255, 255, 255, 0.4);
            --font-outline-dark: rgba(30, 30, 30, 0.9);
            --nav-icon-color: #ffffff; 
        }

        html[data-theme="light"] {
            --glass-bg: rgba(255, 255, 255, 0.55);
            --glass-border: rgba(0, 0, 0, 0.08); 
            --glass-blur: blur(15px) saturate(140%);
            --text-main: #0f172a; 
            --text-muted: #475569; 
            --label-text: #0f172a; 
            --shadow-vision: 0 15px 35px rgba(0, 0, 0, 0.1), inset 0 1px 1px rgba(255, 255, 255, 0.5);
            --text-shadow: none;
            --font-outline: rgba(0, 0, 0, 0.1);
            --nav-icon-color: #f97316;
        }

        body { 
            background: #000; color: var(--text-main); margin: 0; overflow-x: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif; 
            -webkit-font-smoothing: antialiased;
        }

        .text-premium { 
            color: var(--premium-blue) !important; 
            text-shadow: none !important; 
            -webkit-text-stroke: 0 !important; 
            transition: color 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .group:hover .text-premium-hover { 
            color: #ffffff !important; 
        }

        .label-intro { color: #ffffff !important; text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5) !important; }
        .shadow-text { text-shadow: var(--text-shadow); }
        .smoky-highlight { text-shadow: var(--smoky-shadow); }
        
        .intro-btn-text { 
            color: var(--font-outline-dark);
            font-weight: 900;
            text-shadow: none !important;
            letter-spacing: 0.15em;
        }

        .bg-fixed-layer {
            position: fixed; inset: 0; z-index: -2;
            background-image: var(--bg-image);
            background-size: cover; background-position: center;
            transition: filter 2s cubic-bezier(0.25, 1, 0.5, 1), transform 2s cubic-bezier(0.25, 1, 0.5, 1);
            filter: grayscale(0) blur(1px) brightness(0.5);
        }

        .bg-fixed-layer.intro-mode { filter: grayscale(1) blur(1px) brightness(0.7); transform: scale(1.05); }
        html[data-theme="light"] .bg-fixed-layer:not(.intro-mode) { filter: grayscale(0) blur(1px) brightness(1.1); }

        .liquid-glass { 
            background: var(--glass-bg); 
            border: 1px solid var(--glass-border); 
            backdrop-filter: var(--glass-blur); 
            -webkit-backdrop-filter: var(--glass-blur); 
            box-shadow: var(--shadow-vision);
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            transform: translateZ(0); 
        }

        .liquid-label {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 6px 14px;
            border-radius: 24px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            color: var(--label-text);
        }

        .liquid-glass:hover { 
            transform: translateY(-6px) translateZ(0); 
            border-color: rgba(255,255,255,0.3); 
        }

        .bottom-dock { 
            position: fixed; bottom: 20px; 
            left: 0; right: 0; margin-inline: auto;
            z-index: 100; display: flex; gap: 4px; padding: 6px; border-radius: 40px;
            width: fit-content; align-items: center; justify-content: center;
            pointer-events: auto;
        }

        .nav-item { 
            width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; 
            border-radius: 50%; color: var(--nav-icon-color); 
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), background 0.4s ease;
            flex: none; transform-origin: center;
            will-change: transform;
            backface-visibility: hidden;
        }
        @media (min-width: 768px) {
            .bottom-dock { bottom: 28px; gap: 8px; padding: 8px; }
            .nav-item { width: 52px; height: 52px; }
        }
        .nav-item:hover { background: rgba(255,255,255,0.15); transform: scale(1.15); }

        #wa-fab {
            position: fixed; bottom: 20px; right: 20px; z-index: 101;
            width: 48px; height: 48px; border-radius: 50%;
            background: #25D366; color: white; display: flex;
            align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        @media (min-width: 768px) {
            #wa-fab { bottom: 28px; right: 28px; width: 56px; height: 56px; }
        }
        #wa-fab:hover { transform: scale(1.1); }

        #app-gate { position: fixed; inset: 0; z-index: 500; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); padding: 1rem; transition: opacity 0.8s ease; }
        #gate-content { transition: all 1s cubic-bezier(0.25, 1, 0.5, 1); text-align: center; width: 100%; max-width: 36rem; }

        .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; padding: 0 0.5rem; }
        .header-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .inline-hint { font-size: 8px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent-color); }
        @media (min-width: 768px) {
            .section-header { margin-bottom: 2rem; padding: 0 1rem; }
            .header-left { gap: 14px; flex-wrap: nowrap; }
            .inline-hint { font-size: 9px; }
        }

        .switch-container { position: relative; width: 44px; height: 24px; }
        @media (min-width: 768px) { .switch-container { width: 48px; height: 26px; } }
        .switch-container input { opacity: 0; width: 0; height: 0; }
        .switch-slider {
            position: absolute; cursor: pointer; inset: 0; 
            background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border);
            transition: .4s cubic-bezier(0.25, 1, 0.5, 1); border-radius: 30px;
        }
        .switch-slider:before {
            position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 2px;
            background: white; transition: .4s cubic-bezier(0.25, 1, 0.5, 1); border-radius: 50%;
        }
        @media (min-width: 768px) { .switch-slider:before { height: 20px; width: 20px; } }
        input:checked + .switch-slider { background: var(--accent-color); }
        input:checked + .switch-slider:before { transform: translateX(20px); }
        @media (min-width: 768px) { input:checked + .switch-slider:before { transform: translateX(21px); } }

        #main-content { opacity: 0; transition: opacity 1s cubic-bezier(0.25, 1, 0.5, 1); }
        
        .reveal-on-scroll {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1), transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            will-change: opacity, transform;
        }
        .reveal-on-scroll.is-revealed { opacity: 1; transform: translateY(0); }
        .delay-100 { transition-delay: 100ms; }
        .delay-200 { transition-delay: 200ms; }
        .delay-300 { transition-delay: 300ms; }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <script>
        let db = null;

        // Otimização: O Lenis é carregado via defer, garantimos que é instanciado quando disponível
        let lenis;
        window.addEventListener('load', () => {
            if(window.Lenis) {
                lenis = new Lenis({
                    duration: 1.2,
                    easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)), 
                    direction: 'vertical',
                    gestureDirection: 'vertical',
                    smooth: true,
                    mouseMultiplier: 1,
                    smoothTouch: false,
                    touchMultiplier: 2,
                });

                function raf(time) {
                    lenis.raf(time);
                    requestAnimationFrame(raf);
                }
                requestAnimationFrame(raf);
            }
        });

        async function init() {
            db = {

            const headerLogoEl = document.getElementById('header-logo-container');
            
            if(db.empresa.logo && db.empresa.logo.trim() !== "") {
                introLogoEl.innerHTML = `<img src="${db.empresa.logo}" alt="Logo" loading="lazy" decoding="async" class="w-full h-full object-contain p-2 md:p-3">`;
                headerLogoEl.innerHTML = `<img src="${db.empresa.logo}" alt="Logo" loading="lazy" decoding="async" class="w-full h-full object-contain p-1.5 md:p-2">`;
                introLogoEl.classList.remove('bg-orange-600');
                headerLogoEl.classList.remove('bg-orange-600');
                introLogoEl.classList.add('bg-black/50');
                headerLogoEl.classList.add('bg-black/50');
            } else {
                introLogoEl.innerHTML = iconHTML;
                headerLogoEl.innerHTML = headerIconHTML;
            }

            document.getElementById('intro-name').innerText = db.empresa.nome;
            document.getElementById('intro-subtitle').innerText = db.empresa.hero_subtitulo;
            document.getElementById('brand-name').innerText = db.empresa.nome;
            document.getElementById('hero-title').innerText = db.empresa.hero_titulo;
            document.getElementById('hero-subtitle-label').innerText = db.empresa.hero_subtitulo;
            document.getElementById('sobre-texto').innerText = db.empresa.sobre_texto;
            document.getElementById('anos-experiencia').innerText = db.empresa.anos_experiencia;
            document.getElementById('obras-entregues').innerText = db.empresa.obras_entregues;
            document.getElementById('wa-fab').href = `https://wa.me/${db.empresa.whatsapp}`;
            
            const sobreImgEl = document.getElementById('sobre-imagem-container');
            if(db.empresa.foto_sobre && db.empresa.foto_sobre.trim() !== "") {
                sobreImgEl.innerHTML = `<img src="${db.empresa.foto_sobre}" alt="Sobre" loading="lazy" decoding="async" fetchpriority="low" class="w-[75%] h-[75%] md:w-[80%] md:h-[80%] object-contain rounded-[1.5rem] drop-shadow-2xl transition-transform hover:scale-105 duration-700">`;
            } else if (db.empresa.logo && db.empresa.logo.trim() !== "") {
                sobreImgEl.innerHTML = `<img src="${db.empresa.logo}" alt="Logo" loading="lazy" decoding="async" class="w-[50%] h-[50%] object-contain opacity-40">`;
            } else {
                sobreImgEl.innerHTML = `<i class="fa-solid fa-image text-5xl md:text-7xl text-white/20"></i>`;
            }
            
            const grid = document.getElementById('grid-servicos');
            grid.innerHTML = db.servicos.map((s, i) => `
                <div class="liquid-glass rounded-[2rem] md:rounded-[3.5rem] p-6 md:p-12 cursor-pointer active:scale-95 group flex flex-col items-start gap-4 md:gap-8 hover:bg-orange-600 hover:border-orange-600 transition-all h-full reveal-on-scroll delay-${(i % 3 + 1) * 100}" onclick="openServico('${s.id}')">
                    <div class="liquid-label group-hover:bg-orange-600 group-hover:border-orange-500 transition-all">
                        <h3 class="text-[9px] md:text-[11px] font-black uppercase tracking-widest text-premium text-premium-hover">${s.titulo}</h3>
                    </div>
                    <p class="text-sm md:text-base text-muted leading-relaxed text-left font-medium group-hover:text-white/80 flex-1">${s.descricao}</p>
                </div>
            `).join('');
            
            const track = document.getElementById('cases-track');
            track.innerHTML = db.cases.map((c, i) => `
                <div class="w-[85%] sm:w-[60%] lg:w-[45%] flex-none snap-center liquid-glass rounded-[2.5rem] md:rounded-[3.5rem] p-3 md:p-4 cursor-pointer group hover:bg-orange-600 hover:border-orange-600 transition-all h-full flex flex-col reveal-on-scroll delay-${(i % 3 + 1) * 100}" onclick="openCase('${c.id}')">
                    <div class="aspect-video rounded-[2rem] md:rounded-[3rem] overflow-hidden shadow-2xl relative flex-1">
                        <img src="${c.imagem}" alt="${c.cliente}" loading="lazy" decoding="async" fetchpriority="low" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
                        <div class="absolute bottom-4 left-4 md:bottom-6 md:left-8">
                            <div class="liquid-label group-hover:bg-orange-600 group-hover:border-orange-500 transition-all px-3 py-1 md:px-4 md:py-2">
                                <h3 class="text-[8px] md:text-[11px] font-black uppercase tracking-widest text-premium text-premium-hover truncate max-w-[120px] md:max-w-xs">${c.cliente}</h3>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openServico(id) {
            const s = db.servicos.find(x => x.id === id);
            showModal(s.titulo, s.fotos, "");
        }

        function openCase(id) {
            const c = db.cases.find(x => x.id === id);
            showModal(c.cliente, [c.imagem], c.comentario);
        }

        function showModal(title, images, caption) {
            if(lenis) lenis.stop(); 
            document.getElementById('modal-header-title').innerText = title;
            const container = document.getElementById('modal-images');
            const capt = document.getElementById('modal-caption');
            container.innerHTML = images.map(img => `<div class="w-[85%] md:w-full flex-none snap-center aspect-video rounded-[2rem] md:rounded-[2.5rem] overflow-hidden shadow-2xl border border-white/10 mx-auto"><img src="${img}" alt="${title}" loading="lazy" decoding="async" class="w-full h-full object-cover"></div>`).join('');
            
            if(caption) {
                capt.innerText = `"${caption}"`;
                capt.classList.remove('opacity-0', 'translate-y-4');
                capt.classList.add('opacity-100', 'translate-y-0');
            } else {
                capt.classList.add('opacity-0');
            }

            const modal = document.getElementById('immersive-modal');
            const body = document.getElementById('modal-body');
            modal.classList.remove('hidden'); modal.classList.add('flex');
            void modal.offsetWidth;
            modal.classList.remove('opacity-0');
            body.classList.remove('scale-95', 'opacity-0');
            body.classList.add('scale-100', 'opacity-100');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            if(lenis) lenis.start(); 
            const modal = document.getElementById('immersive-modal');
            const body = document.getElementById('modal-body');
            modal.classList.add('opacity-0');
            body.classList.remove('scale-100', 'opacity-100');
            body.classList.add('scale-95', 'opacity-0');
            setTimeout(() => { modal.classList.add('hidden'); modal.classList.remove('flex'); document.body.style.overflow = ''; }, 500); 
        }

        function handleModalClick(e) { if (e.target.id === 'immersive-modal' || e.target.id === 'modal-body') closeModal(); }
        
        document.addEventListener('DOMContentLoaded', () => {
            init();

            document.querySelectorAll('.bottom-dock .nav-item').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault(); 
                    const targetId = link.getAttribute('href');
                    
                    if(lenis) {
                        lenis.scrollTo(targetId, {
                            offset: -100, 
                            duration: 1.5,
                            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t))
                        });
                    } else {
                        document.querySelector(targetId).scrollIntoView({ behavior: 'smooth' });
                    }
                });
            });
        });
    </script>
</body>
</html>
