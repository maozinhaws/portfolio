<!DOCTYPE html>
<html lang="pt-pt" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium - Engenharia de Superfícies</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        // Sincronização Estrita OEM (Modo Nativo do Dispositivo)
        const checkTheme = () => {
            const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            const initialTheme = prefersDark ? 'dark' : 'light';
            
            document.documentElement.setAttribute('data-theme', initialTheme);
            if (initialTheme === 'dark') {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        };

        checkTheme();

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
            checkTheme();
            if(typeof initParallax === 'function') initParallax();
        });
    </script>
    <style>
        :root { 
            --bg-color: #000000; 
            --text-color: #f5f5f7;
            --accent-color: #f97316;
            --glass-bg: rgba(20, 20, 20, 0.05); 
            --glass-border: rgba(255, 255, 255, 0.08); 
            --glass-shadow: 0 25px 55px rgba(0, 0, 0, 0.6); 
            --glass-inset: inset 0 1px 1px rgba(255, 255, 255, 0.05);
            --text-dynamic: #ffffff; 
            --text-muted: #a1a1a6; 
            --blur-effect: blur(60px) saturate(230%);
            --star-color: #1a1a1a;
            --dot-inactive: rgba(255, 255, 255, 0.15);
        }

        html[data-theme="light"] {
            --bg-color: #f2f2f7; 
            --text-color: #1d1d1f;
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(0, 0, 0, 0.08); 
            --glass-shadow: 0 16px 40px rgba(0, 0, 0, 0.25); 
            --glass-inset: inset 0 1px 1px rgba(255, 255, 255, 0.6);
            --text-dynamic: #000000; 
            --text-muted: #3a3a3c; 
            --blur-effect: blur(60px) saturate(220%) contrast(1.05);
            --star-color: #ffffff;
            --dot-inactive: rgba(0, 0, 0, 0.15);
        }

        body { 
            background: var(--bg-color); color: var(--text-color); margin: 0; overflow-x: hidden; 
            font-family: -apple-system, system-ui, sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            transition: background-color 0.4s ease, color 0.4s ease; 
        }

        .ios-glass { 
            background: var(--glass-bg); 
            border: 1px solid var(--glass-border); 
            box-shadow: var(--glass-shadow), var(--glass-inset); 
            backdrop-filter: var(--blur-effect); 
            -webkit-backdrop-filter: var(--blur-effect); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .ios-glass:active { transform: scale(0.98); }
        .text-dynamic { color: var(--text-dynamic); }
        .text-muted { color: var(--text-muted); }
        .text-accent { color: var(--accent-color); }
        
        .paint-canvas { position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none; }
        .section-title { font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em; font-size: 0.7rem; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.5rem; }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .snap-mandatory-x { scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
        .snap-center { scroll-snap-align: center; }

        @keyframes ios-spring {
            from { transform: scale(0.96); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .animate-spring { animation: ios-spring 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        .dot-base { background-color: var(--dot-inactive); transition: all 0.3s ease; }
        .dot-active { background-color: var(--accent-color) !important; width: 1.1rem !important; }

        /* Ícone Técnico da Broca */
        .icon-broca { width: 24px; height: 24px; fill: currentColor; }
    </style>
</head>
<body class="pb-10">
    <div class="paint-canvas" id="main-canvas"></div>

    <header class="sticky top-0 z-40 w-full ios-glass border-x-0 border-t-0 rounded-b-[2.5rem] mb-6">
        <div class="max-w-6xl mx-auto px-5 py-3.5 flex items-center justify-between gap-4">
            <div id="nav-brand" class="flex-1 flex items-center gap-3 overflow-hidden min-w-0"></div>
            
            <div class="flex items-center gap-4 shrink-0">
                <div class="flex flex-col items-center gap-1">
                    <span class="text-[7px] uppercase font-bold text-muted tracking-widest">Matiz</span>
                    <input type="range" min="0" max="11" value="0" class="w-20 h-1 bg-slate-300 dark:bg-slate-800 rounded-lg appearance-none cursor-pointer accent-orange-500" oninput="changeAccent(this.value)">
                </div>
            </div>
        </div>
    </header>

    <nav class="fixed right-2.5 top-1/2 -translate-y-1/2 z-50 flex flex-col gap-3 ios-glass p-1.5 rounded-full shadow-xl">
        <a href="#servicos" class="w-11 h-11 rounded-full flex items-center justify-center text-accent active:scale-90 transition-all ios-glass border-none" title="Serviços">
            <svg class="icon-broca" viewBox="0 0 24 24">
                <path d="M9,2h6c0.55,0,1,0.45,1,1v5H8V3C8,2.45,8.45,2,9,2z"/>
                <rect x="4" y="8" width="16" height="4" rx="1"/>
                <path d="M5,12h14v7c0,1.1-0.9,2-2,2H7c-1.1,0-2-0.9-2-2V12z M8,14v5 M12,14v5 M16,14v5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
        </a>
        <a href="#cases" class="w-11 h-11 rounded-full flex items-center justify-center text-accent active:scale-90 transition-all ios-glass border-none" title="Cases">
            <i class="fa-solid fa-star text-lg"></i>
        </a>
        <a href="#sobre" class="w-11 h-11 rounded-full flex items-center justify-center text-accent active:scale-90 transition-all ios-glass border-none" title="Sobre">
            <i class="fa-solid fa-building text-lg"></i>
        </a>
    </nav>

    <main class="max-w-6xl mx-auto px-5 md:pr-24 relative z-10 space-y-10 lg:space-y-16">
        <section class="text-center py-8 ios-glass rounded-[2.5rem] p-7 animate-spring max-w-2xl mx-auto w-full">
            <h1 id="hero-title" class="text-3xl md:text-4xl font-black leading-tight mb-2 text-dynamic tracking-tight"></h1>
            <p id="hero-subtitle" class="text-[10px] md:text-xs text-accent uppercase font-bold tracking-[0.25em]"></p>
        </section>

        <section id="servicos">
            <h2 class="section-title text-dynamic">
                <i class="fa-solid fa-screwdriver-wrench text-accent"></i> Serviços 
            </h2>
            <div id="grid-servicos" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4"></div>
        </section>

        <section id="cases">
            <h2 class="section-title text-dynamic"><i class="fa-solid fa-camera-retro text-accent"></i> Depoimentos</h2>
            <article class="ios-glass rounded-[2.5rem] overflow-hidden py-8 shadow-2xl">
                <div id="cases-track" class="flex overflow-x-auto snap-mandatory-x hide-scrollbar px-4 gap-6"></div>
                <div id="carousel-dots" class="flex justify-center gap-1.5 pt-6"></div>
            </article>
        </section>

        <section id="sobre" class="ios-glass rounded-[2.5rem] p-8 md:p-12 shadow-2xl grid md:grid-cols-2 gap-8 items-center">
            <div class="space-y-6">
                <h2 class="section-title text-dynamic m-0"><i class="fa-solid fa-building text-accent"></i> Empresa</h2>
                <p id="sobre-texto" class="text-sm md:text-base text-muted leading-relaxed font-medium"></p>
                <h3 class="text-[9px] font-black uppercase text-dynamic tracking-widest mb-2.5 flex items-center gap-2"><i class="fa-solid fa-rocket text-accent"></i> Missão</h3>
                <p id="missao-texto" class="text-xs md:text-sm text-muted leading-relaxed font-medium"></p>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="ios-glass rounded-[2rem] p-6 text-center bg-white/5 border-none">
                    <span id="anos-experiencia" class="block text-3xl font-black text-dynamic"></span>
                    <span class="text-[10px] uppercase font-bold text-accent tracking-wider">Anos Exp.</span>
                </div>
                <div class="ios-glass rounded-[2rem] p-6 text-center bg-white/5 border-none">
                    <span id="obras-entregues" class="block text-3xl font-black text-dynamic"></span>
                    <span class="text-[10px] uppercase font-bold text-accent tracking-wider">Projetos</span>
                </div>
            </div>
        </section>
    </main>

    <div class="fixed bottom-6 left-5 z-50 pointer-events-none">
        <a id="btn-whatsapp" href="#" target="_blank" class="pointer-events-auto w-14 h-14 bg-[#25D366] rounded-full flex items-center justify-center shadow-2xl active:scale-90 transition-transform text-white ios-glass border-none">
            <i class="fa-brands fa-whatsapp text-2xl"></i>
        </a>
    </div>

    <div id="gallery-modal" onclick="handleModalClick(event)" class="fixed inset-0 hidden flex-col opacity-0 transition-opacity duration-300 z-[100] ios-glass">
        <div id="modal-content" class="flex flex-col h-full w-full scale-90 opacity-0 transition-all duration-300">
            <div class="w-full max-w-4xl mx-auto px-6 pt-12 pb-4 flex justify-between items-center text-dynamic">
                <div class="flex flex-col">
                    <span class="text-[9px] font-black text-accent uppercase tracking-widest">Galeria</span>
                    <h2 id="modal-title" class="text-xl md:text-2xl font-black"></h2>
                </div>
                <button onclick="closeGallery()" class="w-10 h-10 ios-glass rounded-full border-none"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="relative w-full max-w-4xl mx-auto flex-1 flex flex-col justify-center overflow-hidden">
                <div id="modal-track" class="w-full flex overflow-x-auto snap-mandatory-x hide-scrollbar px-5 gap-8"></div>
                <div id="modal-dots" class="flex justify-center gap-2 pt-8"></div>
            </div>
        </div>
    </div>

    <script>
        let globalData = null;
        const colors = ['#f97316', '#06b6d4', '#d946ef', '#eab308', '#22c55e', '#ef4444', '#3b82f6', '#8b5cf6', '#14b8a6', '#f43f5e', '#a855f7', '#fb923c'];

        function changeAccent(index) {
            const newColor = colors[index];
            document.documentElement.style.setProperty('--accent-color', newColor);
            localStorage.setItem('accentColor', newColor);
            initParallax(); 
        }

        function initParallax() {
            const canvas = document.getElementById('main-canvas');
            if(!canvas) return;
            canvas.innerHTML = '';
            const drops = [];
            const count = window.innerWidth > 768 ? 45 : 26;
            const currentAccent = getComputedStyle(document.documentElement).getPropertyValue('--accent-color').trim();
            const theme = document.documentElement.getAttribute('data-theme');
            
            for(let i=0; i < count; i++) {
                const drop = document.createElement('div');
                const size = Math.random() * 100 + 40;
                const speed = Math.random() * 0.5 + 0.1;
                const color = i % 2 === 0 ? currentAccent : colors[Math.floor(Math.random() * colors.length)];
                drop.className = 'absolute pointer-events-none';
                drop.style.left = `${Math.random() * 100}%`;
                drop.style.top = `${Math.random() * 200 - 30}vh`; 
                drop.style.opacity = theme === 'light' ? 0.65 : 0.45;
                drop.style.width = `${size}px`; drop.style.height = `${size}px`;
                drop.dataset.speed = speed;
                drop.style.filter = theme === 'light' ? 'blur(12px) saturate(200%)' : 'blur(12px)';
                const core = document.createElement('div');
                core.className = 'absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[65%] h-[65%]';
                core.style.backgroundColor = color;
                core.style.borderRadius = '35% 65% 70% 30% / 30% 30% 70% 70%';
                drop.appendChild(core);
                canvas.appendChild(drop);
                drops.push(drop);
            }

            window.removeEventListener('scroll', window.parallaxScroll);
            window.parallaxScroll = () => {
                const scrollY = window.scrollY;
                requestAnimationFrame(() => {
                    drops.forEach(drop => { drop.style.transform = `translateY(${scrollY * -drop.dataset.speed}px)`; });
                });
            };
            window.addEventListener('scroll', window.parallaxScroll, { passive: true });
        }

        async function initApp() {
            const savedAccent = localStorage.getItem('accentColor');
            if (savedAccent) document.documentElement.style.setProperty('--accent-color', savedAccent);

            initParallax();

            globalData = {
                "empresa": {
                    "nome": "PREMIUM", "whatsapp": "5511999999999", "hero_titulo": "Engenharia de Alto Padrão",
                    "hero_subtitulo": "Excelência em Acabamentos", "sobre_texto": "Especialistas na execução de projetos de acabamento de luxo com rigor técnico e pontualidade britânica.",
                    "missao_texto": "Elevar o padrão do mercado de revestimentos através de inovação técnica.", "anos_experiencia": "10+", "obras_entregues": "500+"
                },
                "servicos": [
                    { "id": "airless", "titulo": "Pintura Airless", "descricao": "Acabamento espelhado de alta performance.", "galeria": ["https://images.unsplash.com/photo-1589939705384-5185137a7f0f?w=800"] },
                    { "id": "texturas", "titulo": "Texturas Nobres", "descricao": "Efeitos decorativos e marmorato exclusivo.", "galeria": ["https://images.unsplash.com/photo-1615873968403-89e068629275?w=800"] },
                    { "id": "cimento", "titulo": "Cimento Queimado", "descricao": "Estética industrial de alta durabilidade.", "galeria": ["https://images.unsplash.com/photo-1533090161767-e6ffed986c88?w=800"] }
                ],
                "cases": [
                    { "imagem": "https://images.unsplash.com/photo-1497366216548-37526070297c?w=800", "cliente": "Construtora Alpha", "comentario": "Execução impecável em todos os detalhes do projeto." }
                ]
            };

            renderizarInterface(globalData);
        }

        function renderizarInterface(data) {
            const navBrand = document.getElementById('nav-brand');
            navBrand.innerHTML = `<div class="flex items-center gap-3 shrink-0">
                <div class="w-10 h-10 bg-accent rounded-xl flex items-center justify-center shadow-lg">
                    <svg class="icon-broca text-white" viewBox="0 0 24 24">
                        <path d="M9,2h6c0.55,0,1,0.45,1,1v5H8V3C8,2.45,8.45,2,9,2z"/>
                        <rect x="4" y="8" width="16" height="4" rx="1"/>
                        <path d="M5,12h14v7c0,1.1-0.9,2-2,2H7c-1.1,0-2-0.9-2-2V12z M8,14v5 M12,14v5 M16,14v5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </div>
                <div class="text-left">
                    <h1 class="text-base font-black tracking-tight text-dynamic uppercase leading-none">${data.empresa.nome}</h1>
                    <p class="text-accent font-bold text-[7px] uppercase tracking-[0.25em] mt-1">Acabamentos</p>
                </div></div>`;
            
            document.getElementById('hero-title').innerHTML = data.empresa.hero_titulo;
            document.getElementById('hero-subtitle').innerText = data.empresa.hero_subtitulo;
            document.getElementById('sobre-texto').innerText = data.empresa.sobre_texto;
            document.getElementById('missao-texto').innerText = data.empresa.missao_texto;
            document.getElementById('anos-experiencia').innerText = data.empresa.anos_experiencia;
            document.getElementById('obras-entregues').innerText = data.empresa.obras_entregues;
            document.getElementById('btn-whatsapp').href = `https://wa.me/${data.empresa.whatsapp}`;
            
            const grid = document.getElementById('grid-servicos');
            grid.innerHTML = data.servicos.map(s => `
                <div class="ios-glass rounded-[1.8rem] p-6 text-center cursor-pointer active:scale-95 transition-transform" onclick="openGallery('${s.id}', '${s.titulo}')">
                    <h3 class="text-[11px] font-black uppercase text-dynamic leading-tight">${s.titulo}</h3>
                    <p class="text-[9px] text-muted mt-2 line-clamp-2">${s.descricao}</p>
                </div>
            `).join('');
            
            const track = document.getElementById('cases-track');
            track.innerHTML = data.cases.map(c => `
                <div class="w-full flex-none snap-center ios-glass rounded-[2.5rem] p-6 flex flex-col md:flex-row gap-6 shadow-xl">
                    <div class="w-full md:w-1/2 aspect-video rounded-[1.8rem] overflow-hidden">
                        <img src="${c.imagem}" class="w-full h-full object-cover">
                    </div>
                    <div class="flex flex-col flex-1 justify-center">
                        <p class="text-sm text-dynamic font-medium italic">"${c.comentario}"</p>
                        <span class="text-[10px] font-black text-accent uppercase mt-4 tracking-widest">- ${c.cliente}</span>
                    </div>
                </div>
            `).join('');
        }

        function openGallery(sid, title) {
            const s = globalData.servicos.find(x => x.id === sid);
            document.getElementById('modal-title').innerText = title;
            const track = document.getElementById('modal-track');
            track.innerHTML = s.galeria.map(img => `<div class="w-full flex-none snap-center aspect-video rounded-[2.2rem] overflow-hidden ios-glass"><img src="${img}" class="w-full h-full object-cover"></div>`).join('');
            const modal = document.getElementById('gallery-modal');
            const content = document.getElementById('modal-content');
            modal.classList.remove('hidden'); modal.classList.add('flex');
            void modal.offsetWidth;
            modal.classList.remove('opacity-0');
            content.classList.remove('scale-90', 'opacity-0');
            content.classList.add('scale-100', 'opacity-100');
            document.body.style.overflow = 'hidden';
        }

        function closeGallery() {
            const modal = document.getElementById('gallery-modal');
            const content = document.getElementById('modal-content');
            modal.classList.add('opacity-0');
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-90', 'opacity-0');
            setTimeout(() => { modal.classList.add('hidden'); modal.classList.remove('flex'); document.body.style.overflow = ''; }, 300); 
        }

        function handleModalClick(e) { if (e.target === document.getElementById('gallery-modal') || e.target === document.getElementById('modal-content')) closeGallery(); }
        window.addEventListener('resize', initParallax);
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
