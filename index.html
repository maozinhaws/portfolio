<!DOCTYPE html>
<html lang="pt-pt" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium - Engenharia de Superfícies</title>
    
    <!-- Otimização: Resource Hints para domínios críticos -->
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" media="print" onload="this.media='all'">
    
    <script>
        const applyTheme = (theme) => {
            document.documentElement.setAttribute('data-theme', theme);
            const isDark = theme === 'dark';
            document.documentElement.classList.toggle('dark', isDark);
            localStorage.setItem('theme-pref', theme);
            const toggle = document.getElementById('theme-toggle-check');
            if(toggle) toggle.checked = isDark;
        };

        const initTheme = () => {
            const saved = localStorage.getItem('theme-pref');
            if (saved) applyTheme(saved);
            else applyTheme(window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        };

        initTheme();

        function startAppSequence() {
            const gateContent = document.getElementById('gate-content');
            const bg = document.querySelector('.bg-fixed-layer');
            const main = document.getElementById('main-content');
            const appGate = document.getElementById('app-gate');

            gateContent.style.opacity = '0';
            gateContent.style.transform = 'scale(0.98)';

            setTimeout(() => {
                bg.classList.remove('intro-mode');
                setTimeout(() => {
                    appGate.style.display = 'none';
                    main.classList.remove('hidden');
                    requestAnimationFrame(() => {
                        main.style.opacity = '1';
                    });
                }, 1200); 
            }, 400);
        }

        function toggleThemeManual() {
            const isChecked = document.getElementById('theme-toggle-check').checked;
            applyTheme(isChecked ? 'dark' : 'light');
        }
    </script>
    <style>
        :root { 
            --bg-image: url('https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?auto=format&fit=crop&w=1920&q=50&fm=webp');
            --accent-color: #f97316;
            --premium-blue: #170e36; 
            
            /* PADRÃO UNIFICADO MODO ESCURO: Calibração de densidade óptica (alpha 0.25) para igualar modo claro */
            --glass-bg: rgba(255, 255, 255, 0.25); 
            --glass-border: rgba(255, 255, 255, 0.18); 
            --glass-blur: blur(15px) saturate(180%);

            --text-main: #ffffff; 
            --text-muted: #cbd5e1; 
            --label-text: #ffffff; 
            
            --shadow-vision: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            --text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
            --smoky-shadow: 0 0 20px rgba(0, 0, 0, 0.9);
            --font-outline: rgba(255, 255, 255, 0.4);
            --font-outline-dark: rgba(30, 30, 30, 0.9);
            --nav-icon-color: #ffffff; 
        }

        html[data-theme="light"] {
            /* PADRÃO UNIFICADO MODO CLARO: Densidade mantida em 0.55 */
            --glass-bg: rgba(255, 255, 255, 0.55);
            --glass-border: rgba(0, 0, 0, 0.08); 
            --glass-blur: blur(15px) saturate(140%);
            --text-main: #0f172a; 
            --text-muted: #475569; 
            --label-text: #0f172a; 
            --shadow-vision: 0 15px 35px rgba(0, 0, 0, 0.1), inset 0 1px 1px rgba(255, 255, 255, 0.5);
            --text-shadow: none;
            --font-outline: rgba(0, 0, 0, 0.1);
            --nav-icon-color: #f97316;
        }

        body { 
            background: #000; color: var(--text-main); margin: 0; overflow-x: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif; 
            -webkit-font-smoothing: antialiased;
        }

        .service-name-dynamic { transition: color 0.3s ease; }
        html[data-theme="light"] .service-name-dynamic { color: var(--premium-blue) !important; }
        html[data-theme="dark"] .service-name-dynamic { color: #ffffff !important; }
        .group:hover .service-name-dynamic { color: #ffffff !important; }

        .header-badge { color: #ffffff !important; text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8) !important; }
        .label-intro { color: #ffffff !important; text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5) !important; }
        .shadow-text { text-shadow: var(--text-shadow); }
        .smoky-highlight { text-shadow: var(--smoky-shadow); }
        .label-outline { -webkit-text-stroke: 0.5px var(--font-outline); }
        
        .intro-btn-text { 
            color: var(--font-outline-dark);
            font-weight: 900;
            text-shadow: none !important;
            letter-spacing: 0.2em;
        }

        .bg-fixed-layer {
            position: fixed; inset: 0; z-index: -2;
            background-image: var(--bg-image);
            background-size: cover; background-position: center;
            transition: filter 2s cubic-bezier(0.4, 0, 0.2, 1), transform 2s ease;
            filter: grayscale(0) blur(1px) brightness(0.5);
        }

        .bg-fixed-layer.intro-mode { filter: grayscale(1) blur(1px) brightness(0.7); transform: scale(1.05); }
        html[data-theme="light"] .bg-fixed-layer:not(.intro-mode) { filter: grayscale(0) blur(1px) brightness(1.1); }

        .liquid-glass { 
            background: var(--glass-bg); 
            border: 1px solid var(--glass-border); 
            backdrop-filter: var(--glass-blur); 
            -webkit-backdrop-filter: var(--glass-blur); 
            box-shadow: var(--shadow-vision);
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            transform: translateZ(0); /* Aceleração de hardware */
        }

        .liquid-label {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 7px 16px;
            border-radius: 24px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
            transition: all 0.3s ease;
            color: var(--label-text);
        }

        .liquid-glass:hover { 
            transform: translateY(-4px) translateZ(0); 
            border-color: rgba(255,255,255,0.3); 
        }

        .bottom-dock { 
            position: fixed; bottom: 28px; 
            left: 0; right: 0; margin-left: auto; margin-right: auto;
            z-index: 100; display: flex; gap: 8px; padding: 8px; border-radius: 40px;
            width: fit-content; align-items: center; justify-content: center;
            pointer-events: auto;
        }

        .nav-item { 
            width: 52px; height: 52px; display: flex; align-items: center; justify-content: center; 
            border-radius: 50%; color: var(--nav-icon-color); 
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), background 0.3s ease;
            flex: none; transform-origin: center;
            will-change: transform;
            backface-visibility: hidden;
        }
        .nav-item:hover { background: rgba(255,255,255,0.15); transform: scale(1.15); }

        #wa-fab {
            position: fixed; bottom: 28px; right: 28px; z-index: 101;
            width: 56px; height: 56px; border-radius: 50%;
            background: #25D366; color: white; display: flex;
            align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3);
            transition: all 0.3s ease;
        }

        #app-gate { position: fixed; inset: 0; z-index: 500; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.4); }
        #gate-content { transition: all 0.8s ease; text-align: center; }

        .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; padding: 0 1rem; }
        .header-left { display: flex; align-items: center; gap: 14px; }
        .inline-hint { font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent-color); }

        .switch-container { position: relative; width: 48px; height: 26px; }
        .switch-container input { opacity: 0; width: 0; height: 0; }
        .switch-slider {
            position: absolute; cursor: pointer; inset: 0; 
            background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border);
            transition: .4s; border-radius: 30px;
        }
        .switch-slider:before {
            position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 2px;
            background: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .switch-slider { background: var(--accent-color); }
        input:checked + .switch-slider:before { transform: translateX(21px); }

        #main-content { opacity: 0; transition: opacity 1.2s ease; }
        .fade-in-up { animation: fadeInUp 0.8s ease forwards; opacity: 0; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div class="bg-fixed-layer intro-mode"></div>

    <div id="app-gate">
        <div id="gate-content" class="space-y-12 px-6 w-full max-w-xl">
            <div class="w-24 h-24 bg-orange-600 rounded-[2.5rem] mx-auto flex items-center justify-center shadow-2xl liquid-glass border-white/30">
                <i class="fa-solid fa-brush text-white text-4xl"></i>
            </div>
            <div class="space-y-6">
                <h2 id="intro-name" class="text-5xl md:text-7xl font-black tracking-[0.1em] text-white uppercase leading-none shadow-text"></h2>
                <div class="flex justify-center">
                    <span id="intro-subtitle" class="liquid-label font-bold uppercase tracking-[0.45em] text-[10px] md:text-xs label-intro"></span>
                </div>
            </div>
            <button onclick="startAppSequence()" class="liquid-glass border-white/20 px-14 py-6 rounded-[2rem] font-black uppercase text-xs tracking-[0.2em] hover:scale-105 active:scale-95 transition-all shadow-lg">
                <span class="intro-btn-text">Acessar portfólio</span>
            </button>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <header class="sticky top-0 z-40 w-full liquid-glass border-x-0 border-t-0 rounded-b-[2.5rem] mb-12">
            <div class="max-w-6xl mx-auto px-6 py-5 flex items-center justify-between">
                <div id="nav-brand" class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-orange-600 rounded-2xl flex items-center justify-center shadow-lg"><i class="fa-solid fa-brush text-white"></i></div>
                    <div class="text-left"><h1 id="brand-name" class="text-lg font-black tracking-tighter uppercase leading-none shadow-text"></h1><p class="text-orange-500 font-bold text-[8px] uppercase tracking-[0.3em] mt-1">Engenharia</p></div>
                </div>
                <div class="flex items-center gap-6">
                    <div class="flex flex-col items-center gap-1">
                        <span class="text-[7px] uppercase font-bold text-muted tracking-widest opacity-60">Modo</span>
                        <label class="switch-container">
                            <input type="checkbox" id="theme-toggle-check" onchange="toggleThemeManual()">
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                </div>
            </div>
        </header>

        <main class="max-w-6xl mx-auto px-6 space-y-16 pb-44">
            <section class="text-center py-16 liquid-glass rounded-[3.5rem] p-10 max-w-3xl mx-auto fade-in-up">
                <h1 id="hero-title" class="text-4xl md:text-6xl font-black leading-tight mb-8 tracking-tighter uppercase text-white smoky-highlight"></h1>
                <div class="flex justify-center">
                    <span id="hero-subtitle-label" class="liquid-label font-bold uppercase tracking-[0.55em] text-[10px]"></span>
                </div>
            </section>

            <section id="sobre" class="liquid-glass rounded-[3.5rem] p-8 md:p-14 grid md:grid-cols-2 gap-12 items-center fade-in-up" style="animation-delay: 0.1s;">
                <div class="space-y-10 text-left">
                    <div class="liquid-label">
                        <i class="fa-solid fa-building text-orange-500"></i>
                        <h2 class="text-[11px] font-black uppercase tracking-widest label-outline shadow-text">A Empresa</h2>
                    </div>
                    <p id="sobre-texto" class="text-base text-muted leading-relaxed font-medium"></p>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="liquid-glass rounded-[2rem] p-6 text-center">
                            <span id="anos-experiencia" class="block text-4xl font-black dark:text-[#170e36]"></span>
                            <span class="text-[9px] uppercase font-black text-orange-500 tracking-widest dark:text-white">Anos Exp.</span>
                        </div>
                        <div class="liquid-glass rounded-[2rem] p-6 text-center">
                            <span id="obras-entregues" class="block text-4xl font-black dark:text-[#170e36]"></span>
                            <span class="text-[9px] uppercase font-black text-orange-500 tracking-widest dark:text-white">Projetos</span>
                        </div>
                    </div>
                </div>
                <div class="aspect-square rounded-[3rem] overflow-hidden liquid-glass p-1 shadow-2xl">
                    <img src="https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?w=600&q=60&fm=webp" loading="lazy" decoding="async" class="w-full h-full object-cover rounded-[2.8rem]">
                </div>
            </section>

            <section id="servicos" class="fade-in-up" style="animation-delay: 0.2s;">
                <div class="section-header">
                    <div class="header-left">
                        <div class="liquid-label header-badge">
                            <i class="fa-solid fa-paint-roller text-orange-500"></i>
                            <h2 class="text-[11px] font-black uppercase tracking-widest label-outline">Serviços</h2>
                        </div>
                        <span class="inline-hint">(Clique para visualizar)</span>
                    </div>
                </div>
                <div id="grid-servicos" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </section>

            <section id="cases" class="fade-in-up" style="animation-delay: 0.3s;">
                <div class="section-header">
                    <div class="header-left">
                        <div class="liquid-label header-badge">
                            <i class="fa-solid fa-comment-dots text-orange-500"></i>
                            <h2 class="text-[11px] font-black uppercase tracking-widest label-outline">Depoimentos</h2>
                        </div>
                        <span class="inline-hint">(Clique para visualizar)</span>
                    </div>
                </div>
                <div id="cases-track" class="flex overflow-x-auto snap-mandatory-x scrollbar-hide gap-6 pb-8"></div>
            </section>
        </main>

        <nav class="bottom-dock liquid-glass shadow-2xl">
            <a href="#sobre" class="nav-item" title="Empresa"><i class="fa-solid fa-building"></i></a>
            <a href="#servicos" class="nav-item" title="Serviços"><i class="fa-solid fa-paint-roller"></i></a>
            <a href="#cases" class="nav-item" title="Depoimentos"><i class="fa-solid fa-comment-dots"></i></a>
        </nav>

        <a id="wa-fab" href="#" target="_blank"><i class="fa-brands fa-whatsapp text-3xl"></i></a>
    </div>

    <!-- Modal -->
    <div id="immersive-modal" onclick="handleModalClick(event)" class="fixed inset-0 hidden flex-col opacity-0 transition-opacity duration-500 z-[200] liquid-glass rounded-none border-none">
        <div id="modal-body" class="flex flex-col h-full w-full scale-95 opacity-0 transition-all duration-500">
            <div class="w-full max-w-5xl mx-auto px-8 pt-16 pb-6 flex justify-between items-center">
                <div class="liquid-label header-badge">
                    <h2 id="modal-header-title" class="text-xs font-black tracking-widest uppercase label-outline"></h2>
                </div>
                <button onclick="closeModal()" class="w-12 h-12 liquid-glass rounded-full border-none flex items-center justify-center active:scale-90"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="relative w-full max-w-5xl mx-auto flex-1 flex flex-col justify-center overflow-hidden">
                <div id="modal-images" class="w-full flex overflow-x-auto snap-mandatory-x scrollbar-hide px-6 gap-8 pb-10"></div>
                <div id="modal-caption" class="p-10 text-center text-base text-muted italic font-medium max-w-2xl mx-auto opacity-0 translate-y-4 transition-all duration-700"></div>
            </div>
        </div>
    </div>

    <script>
        let db = null;

        async function init() {
            db = {
                "empresa": {
                    "nome": "PREMIUM", "whatsapp": "5511999999999", "hero_titulo": "Engenharia de Alto Padrão",
                    "hero_subtitulo": "Estética e Tecnologia de Superfícies", "sobre_texto": "Especialistas na execução de projetos de acabamento de luxo com rigor técnico extremo. Transformamos arquitetura em ambientes exclusivos através de processos de engenharia.",
                    "anos_experiencia": "12+", "obras_entregues": "640+"
                },
                "servicos": [
                    { "id": "airless", "titulo": "Pintura Airless", "descricao": "Acabamento mecanizado de alta precisão para superfícies espelhadas.", "fotos": ["https://images.unsplash.com/photo-1589939705384-5185137a7f0f?w=800&q=60&fm=webp"] },
                    { "id": "textura", "titulo": "Textura Nobre", "descricao": "Revestimentos técnicos com proteção hidrorrepelente de longa duração.", "fotos": ["https://images.unsplash.com/photo-1615873968403-89e068629275?w=800&q=60&fm=webp"] },
                    { "id": "marmorato", "titulo": "Marmorato Polido", "descricao": "Efeito mármore de luxo com brilho vitrificado e profundidade visual.", "fotos": ["https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=800&q=60&fm=webp"] }
                ],
                "cases": [
                    { "id": "c1", "imagem": "https://images.unsplash.com/photo-1497366216548-37526070297c?w=600&q=60&fm=webp", "cliente": "Construtora Alpha", "comentario": "Execução técnica impecável. A equipe cumpriu rigorosamente o cronograma estipulado." },
                    { "id": "c2", "imagem": "https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?w=600&q=60&fm=webp", "cliente": "Arquiteta Maria F.", "comentario": "Excelente qualidade no acabamento em cimento queimado. Total profissionalismo." }
                ]
            };
            renderApp();
        }

        function renderApp() {
            document.getElementById('intro-name').innerText = db.empresa.nome;
            document.getElementById('intro-subtitle').innerText = db.empresa.hero_subtitulo;
            document.getElementById('brand-name').innerText = db.empresa.nome;
            document.getElementById('hero-title').innerText = db.empresa.hero_titulo;
            document.getElementById('hero-subtitle-label').innerText = db.empresa.hero_subtitulo;
            document.getElementById('sobre-texto').innerText = db.empresa.sobre_texto;
            document.getElementById('anos-experiencia').innerText = db.empresa.anos_experiencia;
            document.getElementById('obras-entregues').innerText = db.empresa.obras_entregues;
            document.getElementById('wa-fab').href = `https://wa.me/${db.empresa.whatsapp}`;
            
            const grid = document.getElementById('grid-servicos');
            grid.innerHTML = db.servicos.map(s => `
                <div class="liquid-glass rounded-[3.5rem] p-8 md:p-14 cursor-pointer active:scale-95 group flex flex-col items-start gap-8 hover:bg-orange-600 hover:border-orange-600 transition-all" onclick="openServico('${s.id}')">
                    <div class="liquid-label group-hover:bg-white/20 group-hover:border-white/30 group-hover:text-white transition-all">
                        <h3 class="text-[11px] font-black uppercase tracking-widest shadow-text service-name-dynamic">${s.titulo}</h3>
                    </div>
                    <p class="text-base text-muted leading-relaxed text-left font-medium group-hover:text-white/80">${s.descricao}</p>
                </div>
            `).join('');
            
            const track = document.getElementById('cases-track');
            track.innerHTML = db.cases.map(c => `
                <div class="w-[85%] md:w-[60%] flex-none snap-center liquid-glass rounded-[3.5rem] p-4 cursor-pointer group hover:bg-orange-600 hover:border-orange-600 transition-all" onclick="openCase('${c.id}')">
                    <div class="aspect-video rounded-[3rem] overflow-hidden shadow-2xl relative">
                        <img src="${c.imagem}" loading="lazy" decoding="async" class="w-full h-full object-cover">
                        <div class="absolute bottom-6 left-8">
                            <div class="liquid-label group-hover:bg-white/20 group-hover:border-white/30 group-hover:text-white transition-all">
                                <h3 class="text-[11px] font-black uppercase tracking-widest shadow-text service-name-dynamic">${c.cliente}</h3>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openServico(id) {
            const s = db.servicos.find(x => x.id === id);
            showModal(s.titulo, s.fotos, "");
        }

        function openCase(id) {
            const c = db.cases.find(x => x.id === id);
            showModal(c.cliente, [c.imagem], c.comentario);
        }

        function showModal(title, images, caption) {
            document.getElementById('modal-header-title').innerText = title;
            const container = document.getElementById('modal-images');
            const capt = document.getElementById('modal-caption');
            container.innerHTML = images.map(img => `<div class="w-full flex-none snap-center aspect-video rounded-[2.5rem] overflow-hidden shadow-2xl border border-white/10"><img src="${img}" loading="lazy" decoding="async" class="w-full h-full object-cover"></div>`).join('');
            
            if(caption) {
                capt.innerText = `"${caption}"`;
                capt.classList.remove('opacity-0', 'translate-y-4');
                capt.classList.add('opacity-100', 'translate-y-0');
            } else {
                capt.classList.add('opacity-0');
            }

            const modal = document.getElementById('immersive-modal');
            const body = document.getElementById('modal-body');
            modal.classList.remove('hidden'); modal.classList.add('flex');
            void modal.offsetWidth;
            modal.classList.remove('opacity-0');
            body.classList.remove('scale-95', 'opacity-0');
            body.classList.add('scale-100', 'opacity-100');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('immersive-modal');
            const body = document.getElementById('modal-body');
            modal.classList.add('opacity-0');
            body.classList.remove('scale-100', 'opacity-100');
            body.classList.add('scale-95', 'opacity-0');
            setTimeout(() => { modal.classList.add('hidden'); modal.classList.remove('flex'); document.body.style.overflow = ''; }, 500); 
        }

        function handleModalClick(e) { if (e.target.id === 'immersive-modal' || e.target.id === 'modal-body') closeModal(); }
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
