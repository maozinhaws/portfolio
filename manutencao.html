<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS | Painel de Manutenção</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #020617; color: #e2e8f0; font-family: -apple-system, system-ui, sans-serif; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(16px); }
        .input-dark { background: #0f172a; border: 1px solid #334155; color: white; width: 100%; padding: 0.75rem; border-radius: 0.5rem; transition: border-color 0.2s; }
        .tab-btn.active { background: #f97316; color: white; border-color: #ea580c; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-64 glass-panel border-r border-slate-800 flex flex-col justify-between z-20 relative">
        <div>
            <div class="p-6 border-b border-slate-800">
                <h1 class="text-xl font-black text-white tracking-tighter">PREMIUM<span class="text-orange-500">.</span></h1>
                <p class="text-[10px] text-slate-400 uppercase tracking-widest mt-1">Painel de Controlo</p>
            </div>
            <nav class="p-4 space-y-2">
                <button onclick="changeTab('empresa')" id="tab-empresa" class="tab-btn active w-full text-left px-4 py-3 rounded-xl text-sm font-bold text-slate-300 hover:bg-slate-800 transition-colors border border-transparent"><i class="fa-solid fa-building w-6"></i> Empresa</button>
                <button onclick="changeTab('servicos')" id="tab-servicos" class="tab-btn w-full text-left px-4 py-3 rounded-xl text-sm font-bold text-slate-300 hover:bg-slate-800 transition-colors border border-transparent"><i class="fa-solid fa-screwdriver-wrench w-6"></i> Serviços</button>
                <button onclick="changeTab('cases')" id="tab-cases" class="tab-btn w-full text-left px-4 py-3 rounded-xl text-sm font-bold text-slate-300 hover:bg-slate-800 transition-colors border border-transparent"><i class="fa-solid fa-medal w-6"></i> Cases</button>
            </nav>
        </div>
        <div class="p-4 border-t border-slate-800">
            <button onclick="exportJSON()" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3 rounded-xl shadow-lg shadow-green-600/20 transition-all flex justify-center items-center gap-2">
                <i class="fa-solid fa-download"></i> Guardar (data.json)
            </button>
        </div>
    </aside>

    <main class="flex-1 h-screen overflow-y-auto p-8 relative">
        <div class="max-w-4xl mx-auto space-y-8" id="editor-container">
            <div class="flex items-center justify-center h-64 text-slate-500">
                <i class="fa-solid fa-spinner animate-spin text-3xl text-orange-500"></i>
            </div>
        </div>
    </main>

    <script>
        let db = { empresa: {}, servicos: [], cases: [] };
        let currentTab = 'empresa';

        async function initCMS() {
            try {
                // CORREÇÃO PONTUAL: Adicionado Cache Buster (?t=timestamp) para forçar o carregamento do JSON do servidor
                const url = 'data.json?t=' + Date.now();
                const res = await fetch(url, { 
                    cache: 'no-store',
                    headers: { 'Cache-Control': 'no-cache', 'Pragma': 'no-cache' }
                });
                
                if (res.ok) {
                    db = await res.json();
                } else {
                    initEmptyDB();
                }
            } catch (e) {
                initEmptyDB();
            }
            renderTab();
        }

        function initEmptyDB() {
            db = {
                empresa: { nome: "PREMIUM", logo_url: "", whatsapp: "", hero_titulo: "", hero_subtitulo: "", sobre_texto: "", missao_texto: "", anos_experiencia: "", obras_entregues: "" },
                servicos: [],
                cases: []
            };
        }

        function changeTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active', 'bg-orange-500', 'text-white'));
            document.getElementById(`tab-${tabName}`).classList.add('active');
            currentTab = tabName;
            renderTab();
        }

        function renderTab() {
            const container = document.getElementById('editor-container');
            container.innerHTML = ''; 

            if (currentTab === 'empresa') renderEmpresa(container);
            if (currentTab === 'servicos') renderServicos(container);
            if (currentTab === 'cases') renderCases(container);
        }

        function renderEmpresa(container) {
            const obj = db.empresa;
            container.innerHTML = `
                <div class="glass-panel p-8 rounded-2xl">
                    <h2 class="text-xl font-bold text-white mb-6"><i class="fa-solid fa-building text-orange-500 mr-2"></i> Identidade e Contactos</h2>
                    <div class="grid grid-cols-2 gap-6">
                        <div><label class="text-xs text-slate-400 font-bold uppercase block mb-2">Nome da Empresa</label>
                        <input type="text" class="input-dark" value="${obj.nome || ''}" onchange="updateDB('empresa', 'nome', this.value)"></div>
                        
                        <div><label class="text-xs text-slate-400 font-bold uppercase block mb-2">Logótipo (Upload)</label>
                        <input type="file" accept="image/*" class="input-dark text-sm" onchange="handleSingleUpload('empresa', 'logo_url', this)">
                        ${obj.logo_url ? `<img src="${obj.logo_url}" class="h-10 mt-2 object-contain rounded">` : ''}</div>
                    </div>
                </div>
            `;
        }

        function renderServicos(container) {
            container.innerHTML = `<button onclick="addArrayItem('servicos', {id: 's'+Date.now(), titulo: 'Novo', descricao: '', galeria: []})" class="bg-orange-600 px-6 py-2 rounded-xl mb-4 font-bold text-white">+ Serviço</button>`;
            db.servicos.forEach((s, idx) => {
                container.innerHTML += `
                    <div class="glass-panel p-6 rounded-xl mb-4 relative">
                        <button onclick="removeArrayItem('servicos', ${idx})" class="absolute top-4 right-4 text-red-500"><i class="fa-solid fa-trash"></i></button>
                        <input type="text" class="input-dark mb-4" value="${s.titulo}" placeholder="Título" onchange="db.servicos[${idx}].titulo = this.value">
                        <input type="file" multiple class="input-dark text-xs" onchange="handleMultipleUpload(${idx}, this)">
                    </div>
                `;
            });
        }

        function renderCases(container) {
            container.innerHTML = `<button onclick="addArrayItem('cases', {cliente: 'Novo', comentario: '', imagem: ''})" class="bg-orange-600 px-6 py-2 rounded-xl mb-4 font-bold text-white">+ Case</button>`;
            db.cases.forEach((c, idx) => {
                container.innerHTML += `
                    <div class="glass-panel p-6 rounded-xl mb-4 relative">
                        <button onclick="removeArrayItem('cases', ${idx})" class="absolute top-4 right-4 text-red-500"><i class="fa-solid fa-trash"></i></button>
                        <input type="text" class="input-dark mb-4" value="${c.cliente}" onchange="db.cases[${idx}].cliente = this.value">
                        <input type="file" class="input-dark text-xs" onchange="handleArrayUpload('cases', ${idx}, 'imagem', this)">
                    </div>
                `;
            });
        }

        async function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = event => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const maxWidth = 800; 
                        const scaleSize = maxWidth / img.width;
                        canvas.width = maxWidth;
                        canvas.height = img.height * scaleSize;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7)); 
                    };
                };
            });
        }

        async function handleSingleUpload(section, key, input) {
            if (!input.files.length) return;
            db[section][key] = await compressImage(input.files[0]);
            renderTab();
        }

        async function handleArrayUpload(section, index, key, input) {
            if (!input.files.length) return;
            db[section][index][key] = await compressImage(input.files[0]);
            renderTab();
        }

        async function handleMultipleUpload(servicoIndex, input) {
            for (let file of input.files) {
                const b64 = await compressImage(file);
                db.servicos[servicoIndex].galeria.push(b64);
            }
            renderTab();
        }

        function updateDB(section, key, value) { db[section][key] = value; }
        function addArrayItem(section, template) { db[section].push(template); renderTab(); }
        function removeArrayItem(section, index) { if(confirm("Excluir item?")) { db[section].splice(index, 1); renderTab(); } }

        function exportJSON() {
            const blob = new Blob([JSON.stringify(db, null, 4)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.download = "data.json";
            link.click();
            alert("data.json pronto. Substitua no GitHub e aguarde 2 minutos para o deploy terminar.");
        }

        document.addEventListener('DOMContentLoaded', initCMS);
    </script>
</body>
</html>
