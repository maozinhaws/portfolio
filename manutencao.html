<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS | Painel de Gestão Técnica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --accent: #f97316;
            --bg: #020617;
            --panel: rgba(30, 41, 59, 0.5);
            --border: rgba(255, 255, 255, 0.1);
        }
        body { 
            background: var(--bg); 
            color: #f1f5f9; 
            font-family: -apple-system, system-ui, sans-serif; 
            min-height: 100vh;
        }
        .glass { 
            background: var(--panel); 
            backdrop-filter: blur(20px); 
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .input-field {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border);
            color: white;
            transition: all 0.2s;
        }
        .input-field:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 0 2px rgba(249, 115, 22, 0.2);
        }
        .tab-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .tab-btn.active { 
            background: var(--accent); 
            color: white;
            box-shadow: 0 10px 15px -3px rgba(249, 115, 22, 0.4);
        }
        .icon-broca { width: 20px; height: 20px; fill: currentColor; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-orange-600 rounded-xl flex items-center justify-center shadow-lg">
                    <svg class="icon-broca text-white" viewBox="0 0 24 24">
                        <path d="M10,2h4a1,1,0,0,1,1,1v4a1,1,0,0,1-1,1h-4a1,1,0,0,1-1-1v-4A1,1,0,0,1,10,2z" />
                        <path d="M4,8h16a1,1,0,0,1,1,1v3H3V9A1,1,0,0,1,4,8z" />
                        <path d="M3,12h18v7a2,2,0,0,1-2,2H5a2,2,0,0,1-2-2v-7zm2,2v5h2v-5H5zm3,0v5h2v-5H8zm3,0v5h2v-5h-2zm3,0v5h2v-5h-2zm3,0v5h2v-5h-2z" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-2xl font-black tracking-tight">PAINEL DE MANUTENÇÃO</h1>
                    <p class="text-xs font-bold text-orange-500 tracking-widest uppercase">Gestão de Engenharia de Superfícies</p>
                </div>
            </div>
            <button onclick="exportJSON()" class="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-3 rounded-xl font-bold transition-all flex items-center gap-2 shadow-lg active:scale-95">
                <i class="fa-solid fa-file-export"></i> EXPORTAR DATA.JSON
            </button>
        </header>

        <!-- Tabs -->
        <div class="flex gap-2 mb-6 overflow-x-auto pb-2 hide-scrollbar">
            <button onclick="switchTab('geral')" id="btn-geral" class="tab-btn active px-5 py-2.5 rounded-lg glass font-bold text-xs uppercase tracking-widest flex-none">Geral</button>
            <button onclick="switchTab('servicos')" id="btn-servicos" class="tab-btn px-5 py-2.5 rounded-lg glass font-bold text-xs uppercase tracking-widest flex-none">Serviços</button>
            <button onclick="switchTab('cases')" id="btn-cases" class="tab-btn px-5 py-2.5 rounded-lg glass font-bold text-xs uppercase tracking-widest flex-none">Depoimentos</button>
        </div>

        <!-- Main Panel -->
        <div id="editor-container" class="glass rounded-[2rem] p-6 md:p-10 animate-spring">
            <!-- Dynamic Content Load -->
        </div>
    </div>

    <script>
        let db = {
            "empresa": {
                "nome": "PREMIUM",
                "whatsapp": "5511999999999",
                "hero_titulo": "Engenharia de Alto Padrão",
                "hero_subtitulo": "Excelência em Acabamentos",
                "sobre_texto": "Especialistas na execução de projetos de acabamento de luxo com rigor técnico.",
                "missao_texto": "Elevar o padrão do mercado de revestimentos através de inovação técnica.",
                "anos_experiencia": "10+",
                "obras_entregues": "500+"
            },
            "servicos": [],
            "cases": []
        };

        let currentTab = 'geral';

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${tab}`).classList.add('active');
            renderTab();
        }

        function renderTab() {
            const container = document.getElementById('editor-container');
            container.innerHTML = '';

            if (currentTab === 'geral') {
                container.innerHTML = `
                    <div class="grid md:grid-cols-2 gap-6">
                        ${renderInput('Nome da Empresa', 'empresa.nome')}
                        ${renderInput('WhatsApp (c/ DDI)', 'empresa.whatsapp')}
                        ${renderInput('Título Hero', 'empresa.hero_titulo')}
                        ${renderInput('Subtítulo Hero', 'empresa.hero_subtitulo')}
                        ${renderTextarea('Sobre a Empresa', 'empresa.sobre_texto')}
                        ${renderTextarea('Missão Técnica', 'empresa.missao_texto')}
                        ${renderInput('Anos de Exp.', 'empresa.anos_experiencia')}
                        ${renderInput('Projetos Concluídos', 'empresa.obras_entregues')}
                    </div>
                `;
            } else if (currentTab === 'servicos') {
                container.innerHTML = `
                    <div class="flex justify-between items-center mb-8">
                        <h3 class="font-black text-xl tracking-tight uppercase">Catálogo de Serviços</h3>
                        <button onclick="addItem('servicos')" class="bg-orange-600 px-4 py-2 rounded-lg text-xs font-bold uppercase">Novo Serviço</button>
                    </div>
                    <div class="space-y-6">
                        ${db.servicos.map((s, i) => `
                            <div class="p-6 bg-slate-900/50 rounded-2xl border border-white/5">
                                <div class="flex justify-between mb-4">
                                    <span class="text-[10px] font-black text-orange-500 uppercase tracking-widest">ID: ${s.id}</span>
                                    <button onclick="removeItem('servicos', ${i})" class="text-red-400 hover:text-red-300 text-sm"><i class="fa-solid fa-trash"></i></button>
                                </div>
                                <div class="grid md:grid-cols-2 gap-4">
                                    ${renderInput('Título', `servicos.${i}.titulo`)}
                                    ${renderInput('ID Interno', `servicos.${i}.id`)}
                                    ${renderTextarea('Descrição', `servicos.${i}.descricao`, 'md:col-span-2')}
                                    <div class="md:col-span-2">
                                        <label class="block text-[10px] font-black uppercase mb-2 text-slate-400">URLs das Imagens (Separadas por vírgula)</label>
                                        <textarea onchange="updateArrayValue('servicos', ${i}, 'galeria', this.value)" class="input-field w-full rounded-xl p-3 text-sm h-24">${s.galeria.join(', ')}</textarea>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            } else if (currentTab === 'cases') {
                container.innerHTML = `
                    <div class="flex justify-between items-center mb-8">
                        <h3 class="font-black text-xl tracking-tight uppercase">Depoimentos & Cases</h3>
                        <button onclick="addItem('cases')" class="bg-orange-600 px-4 py-2 rounded-lg text-xs font-bold uppercase">Novo Caso</button>
                    </div>
                    <div class="grid md:grid-cols-2 gap-6">
                        ${db.cases.map((c, i) => `
                            <div class="p-6 bg-slate-900/50 rounded-2xl border border-white/5">
                                <div class="flex justify-between mb-4">
                                    <span class="text-[10px] font-black text-orange-500 uppercase tracking-widest">Depoimento #${i+1}</span>
                                    <button onclick="removeItem('cases', ${i})" class="text-red-400 hover:text-red-300 text-sm"><i class="fa-solid fa-trash"></i></button>
                                </div>
                                <div class="space-y-4">
                                    ${renderInput('Nome do Cliente', `cases.${i}.cliente`)}
                                    ${renderInput('URL da Imagem', `cases.${i}.imagem`)}
                                    ${renderTextarea('Comentário', `cases.${i}.comentario`)}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
        }

        function renderInput(label, path) {
            const val = getPath(db, path);
            return `
                <div>
                    <label class="block text-[10px] font-black uppercase mb-2 text-slate-400 tracking-widest">${label}</label>
                    <input type="text" value="${val}" oninput="setPath(db, '${path}', this.value)" class="input-field w-full rounded-xl p-3 text-sm">
                </div>
            `;
        }

        function renderTextarea(label, path, span = '') {
            const val = getPath(db, path);
            return `
                <div class="${span}">
                    <label class="block text-[10px] font-black uppercase mb-2 text-slate-400 tracking-widest">${label}</label>
                    <textarea oninput="setPath(db, '${path}', this.value)" class="input-field w-full rounded-xl p-3 text-sm h-24">${val}</textarea>
                </div>
            `;
        }

        function getPath(obj, path) {
            return path.split('.').reduce((o, i) => o[i], obj);
        }

        function setPath(obj, path, value) {
            const parts = path.split('.');
            const last = parts.pop();
            const deep = parts.reduce((o, i) => o[i], obj);
            deep[last] = value;
        }

        function updateArrayValue(section, index, key, value) {
            if(key === 'galeria') {
                db[section][index][key] = value.split(',').map(s => s.trim()).filter(s => s !== '');
            } else {
                db[section][index][key] = value;
            }
        }

        function addItem(type) {
            if(type === 'servicos') {
                db.servicos.push({ "id": "novo-id", "titulo": "Novo Serviço", "descricao": "", "galeria": [] });
            } else {
                db.cases.push({ "imagem": "", "cliente": "Nome do Cliente", "comentario": "", "estrelas": 5 });
            }
            renderTab();
        }

        function removeItem(type, i) {
            if(confirm("Deseja eliminar este registo permanentemente?")) {
                db[type].splice(i, 1);
                renderTab();
            }
        }

        function exportJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "data.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        // Inicialização
        document.addEventListener('DOMContentLoaded', () => {
            renderTab();
        });
    </script>
</body>
</html>
