<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS | Painel de Gestão Técnica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --accent: #f97316;
            --bg: #020617;
            --panel: rgba(30, 41, 59, 0.5);
            --border: rgba(255, 255, 255, 0.1);
        }
        body { background: var(--bg); color: #f1f5f9; font-family: -apple-system, system-ui, sans-serif; min-height: 100vh; overflow-x: hidden; }
        .glass { background: var(--panel); backdrop-filter: blur(20px); border: 1px solid var(--border); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .input-field { background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: white; padding: 0.875rem; border-radius: 0.5rem; width: 100%; outline: none; transition: border-color 0.3s; }
        .input-field:focus { border-color: var(--accent); }
        .btn { background: var(--accent); color: white; padding: 0.75rem 1.5rem; border-radius: 0.5rem; font-weight: 800; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; transition: all 0.3s; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; text-align: center; }
        .btn:hover { opacity: 0.8; transform: scale(0.98); }
        .tab-active { border-bottom: 2px solid var(--accent); color: var(--accent) !important; }
        
        /* Custom scrollbar para textareas com base64 e tabs mobile */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(249, 115, 22, 0.5); border-radius: 6px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    </style>
</head>
<body class="p-4 md:p-8 lg:p-12">
    <div class="max-w-6xl mx-auto space-y-6 md:space-y-8">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center glass p-6 md:p-8 rounded-2xl gap-4 md:gap-0">
            <div>
                <h1 class="text-xl md:text-2xl lg:text-3xl font-black tracking-wider"><i class="fa-solid fa-database text-orange-500 mr-3"></i>DATA MANAGEMENT</h1>
                <p class="text-[10px] md:text-xs font-bold text-slate-400 mt-1 md:mt-2 uppercase tracking-widest">Painel de Controlo do Portfólio</p>
            </div>
            <button onclick="exportJSON()" class="btn shadow-lg shadow-orange-500/20 w-full md:w-auto"><i class="fa-solid fa-download"></i>Exportar JSON</button>
        </header>

        <div class="glass rounded-2xl overflow-hidden">
            <div class="flex overflow-x-auto border-b border-white/10 bg-black/20 whitespace-nowrap">
                <button onclick="setTab('empresa')" id="tab-empresa" class="px-5 md:px-8 py-4 md:py-5 font-black tracking-widest text-[10px] md:text-xs uppercase tab-active text-white transition-colors">Empresa</button>
                <button onclick="setTab('servicos')" id="tab-servicos" class="px-5 md:px-8 py-4 md:py-5 font-black tracking-widest text-[10px] md:text-xs uppercase text-slate-500 hover:text-slate-300 transition-colors">Serviços</button>
                <button onclick="setTab('cases')" id="tab-cases" class="px-5 md:px-8 py-4 md:py-5 font-black tracking-widest text-[10px] md:text-xs uppercase text-slate-500 hover:text-slate-300 transition-colors">Depoimentos</button>
            </div>
            <div id="editor-container" class="p-5 md:p-8 lg:p-10 space-y-6">
                <!-- Conteúdo renderizado via JS -->
            </div>
        </div>
    </div>

    <script>
        let currentTab = 'empresa';
        
        let db = {
            "empresa": {
                "logo": "",
                "nome": "PREMIUM", "whatsapp": "5511999999999", "hero_titulo": "Engenharia de Alto Padrão",
                "hero_subtitulo": "Estética e Tecnologia de Superfícies", "sobre_texto": "Especialistas na execução de projetos de acabamento de luxo com rigor técnico extremo. Transformamos arquitetura em ambientes exclusivos através de processos de engenharia.",
                "anos_experiencia": "12+", "obras_entregues": "640+"
            },
            "servicos": [
                { "id": "airless", "titulo": "Pintura Airless", "descricao": "Acabamento mecanizado de alta precisão para superfícies espelhadas.", "fotos": ["https://images.unsplash.com/photo-1589939705384-5185137a7f0f?w=800&q=60&fm=webp"] },
                { "id": "textura", "titulo": "Textura Nobre", "descricao": "Revestimentos técnicos com proteção hidrorrepelente de longa duração.", "fotos": ["https://images.unsplash.com/photo-1615873968403-89e068629275?w=800&q=60&fm=webp"] },
                { "id": "marmorato", "titulo": "Marmorato Polido", "descricao": "Efeito mármore de luxo com brilho vitrificado e profundidade visual.", "fotos": ["https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=800&q=60&fm=webp"] }
            ],
            "cases": [
                { "id": "c1", "imagem": "https://images.unsplash.com/photo-1497366216548-37526070297c?w=600&q=60&fm=webp", "cliente": "Construtora Alpha", "comentario": "Execução técnica impecável. A equipe cumpriu rigorosamente o cronograma estipulado." },
                { "id": "c2", "imagem": "https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?w=600&q=60&fm=webp", "cliente": "Arquiteta Maria F.", "comentario": "Excelente qualidade no acabamento em cimento queimado. Total profissionalismo." }
            ]
        };

        function setTab(tab) {
            document.getElementById(`tab-${currentTab}`).classList.remove('tab-active', 'text-white');
            document.getElementById(`tab-${currentTab}`).classList.add('text-slate-500');
            
            currentTab = tab;
            
            document.getElementById(`tab-${currentTab}`).classList.add('tab-active', 'text-white');
            document.getElementById(`tab-${currentTab}`).classList.remove('text-slate-500');
            
            renderTab();
        }

        function updateEmpresa(key, value) {
            db.empresa[key] = value;
        }

        function updateArray(section, index, key, value) {
            if(key === 'fotos') {
                db[section][index][key] = value.split('\\n').map(s => s.trim()).filter(s => s !== '');
            } else {
                db[section][index][key] = value;
            }
        }

        function addItem(type) {
            if(type === 'servicos') {
                db.servicos.push({ "id": "sv" + Date.now(), "titulo": "Novo Serviço", "descricao": "", "fotos": [] });
            } else {
                db.cases.push({ "id": "cs" + Date.now(), "imagem": "", "cliente": "Nome do Cliente", "comentario": "" });
            }
            renderTab();
        }

        function removeItem(type, i) {
            if(confirm("Confirma a exclusão deste registo permanentemente?")) {
                db[type].splice(i, 1);
                renderTab();
            }
        }

        function processImageUpload(input, section, index, key) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800;
                    let width = img.width;
                    let height = img.height;

                    if (width > MAX_WIDTH) {
                        height = Math.round((height * MAX_WIDTH) / width);
                        width = MAX_WIDTH;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    const webpBase64 = canvas.toDataURL('image/webp', 0.75);

                    if (section === 'empresa') {
                        db.empresa[key] = webpBase64;
                    } else if (key === 'fotos') {
                        db[section][index][key].push(webpBase64);
                    } else {
                        db[section][index][key] = webpBase64;
                    }
                    renderTab();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function exportJSON() {
            const dataStr = "data:text/javascript;charset=utf-8," + encodeURIComponent(`let db = ${JSON.stringify(db, null, 4)};`);
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "dados_atualizados.js");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        function renderTab() {
            const container = document.getElementById('editor-container');
            let html = '';

            if (currentTab === 'empresa') {
                html = `<div class="grid grid-cols-1 lg:grid-cols-2 gap-6 lg:gap-8">`;
                for (const [key, value] of Object.entries(db.empresa)) {
                    const isFullWidth = key === 'sobre_texto' || key === 'logo';
                    html += `
                        <div class="flex flex-col ${isFullWidth ? 'lg:col-span-2' : ''}">
                            <label class="flex flex-wrap gap-2 justify-between items-end text-[10px] md:text-xs font-black uppercase text-orange-500 mb-2 tracking-widest">
                                <span>${key.replace('_', ' ')}</span>
                                ${key === 'logo' ? `
                                    <label class="btn bg-slate-700 hover:bg-slate-600 px-3 py-1 md:py-2 text-[9px] md:text-[10px] cursor-pointer">
                                        <i class="fa-solid fa-upload"></i> Otimizar & Upload
                                        <input type="file" accept="image/*" class="hidden" onchange="processImageUpload(this, 'empresa', null, '${key}')">
                                    </label>
                                ` : ''}
                            </label>
                            ${key === 'sobre_texto' 
                                ? `<textarea rows="4" class="input-field text-xs md:text-sm flex-1 resize-y" onchange="updateEmpresa('${key}', this.value)">${value}</textarea>`
                                : key === 'logo'
                                    ? `<div class="flex flex-col flex-1"><textarea rows="2" class="input-field text-[10px] md:text-xs text-slate-400 break-all resize-y" onchange="updateEmpresa('${key}', this.value)">${value}</textarea>
                                       <span class="text-[9px] text-slate-500 mt-2 block uppercase tracking-widest">URL ou Base64</span></div>`
                                    : `<input type="text" class="input-field text-xs md:text-sm" value="${value}" onchange="updateEmpresa('${key}', this.value)">`
                            }
                        </div>
                    `;
                }
                html += `</div>`;
            } else {
                // Layout simétrico em Grid para os cards de Serviços e Depoimentos
                html = `<div class="grid grid-cols-1 lg:grid-cols-2 gap-6 lg:gap-8">`;
                
                html += db[currentTab].map((item, i) => `
                    <div class="glass p-5 md:p-6 lg:p-8 rounded-xl border-l-4 border-l-orange-500 relative flex flex-col h-full">
                        <button onclick="removeItem('${currentTab}', ${i})" class="absolute top-3 right-3 md:top-4 md:right-4 w-8 h-8 flex items-center justify-center rounded-full bg-black/20 text-slate-400 hover:bg-red-500/20 hover:text-red-500 transition-colors"><i class="fa-solid fa-trash text-sm"></i></button>
                        
                        <div class="grid grid-cols-1 gap-4 mt-4 flex-1">
                            ${Object.entries(item).map(([k, v]) => `
                                <div class="flex flex-col">
                                    <label class="flex flex-wrap gap-2 justify-between items-end text-[10px] md:text-xs font-black uppercase text-orange-500 mb-2 tracking-widest">
                                        <span>${k}</span>
                                        ${k === 'fotos' || k === 'imagem' ? `
                                            <label class="btn bg-slate-700 hover:bg-slate-600 px-3 py-1 md:py-2 text-[9px] md:text-[10px] cursor-pointer">
                                                <i class="fa-solid fa-upload"></i> Otimizar & Upload
                                                <input type="file" accept="image/*" class="hidden" onchange="processImageUpload(this, '${currentTab}', ${i}, '${k}')">
                                            </label>
                                        ` : ''}
                                    </label>
                                    
                                    ${k === 'descricao' || k === 'comentario' 
                                        ? `<textarea rows="3" class="input-field text-xs md:text-sm flex-1 resize-y" onchange="updateArray('${currentTab}', ${i}, '${k}', this.value)">${v}</textarea>`
                                        : k === 'fotos' 
                                            ? `<div class="flex flex-col flex-1"><textarea rows="3" class="input-field text-[10px] md:text-xs text-slate-400 break-all resize-y" onchange="updateArray('${currentTab}', ${i}, '${k}', this.value)">${v.join('\n')}</textarea>
                                               <span class="text-[9px] text-slate-500 mt-2 block uppercase tracking-widest">URLs ou Base64 (Uma por linha)</span></div>`
                                            : `<input type="text" class="input-field text-xs md:text-sm text-slate-100" value="${v}" onchange="updateArray('${currentTab}', ${i}, '${k}', this.value)">`
                                    }
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `).join('');
                
                html += `</div>`;
                html += `<div class="mt-6 lg:mt-8"><button onclick="addItem('${currentTab}')" class="btn w-full bg-transparent border-2 border-orange-500 text-orange-500 hover:bg-orange-500 hover:text-white py-4 text-xs md:text-sm"><i class="fa-solid fa-plus"></i> Adicionar Novo Registo</button></div>`;
            }

            container.innerHTML = html;
        }

        window.onload = renderTab;
    </script>
</body>
</html>
